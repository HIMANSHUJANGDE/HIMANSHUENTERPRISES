<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Code Generator & Scanner</title>
  <!-- QR Code Generator Library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <!-- QR Code Scanner Library -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
    }
    textarea, input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      background: #007bff;
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover {
      background: #0056b3;
    }
    canvas {
      display: block;
      margin: 20px auto;
    }
    #reader {
      margin-top: 20px;
      width: 100%;
    }
    .output {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>QR Code Generator & Scanner</h1>

    <!-- Generator -->
    <div>
      <h2>Generate QR Code</h2>
      <textarea id="qr-input" rows="4" placeholder="Enter text or URL"></textarea>
      <button onclick="generateQR()">Generate</button>
      <canvas id="qr-canvas"></canvas>
    </div>

    <!-- Scanner -->
    <div>
      <h2>Scan QR Code</h2>
      <div id="reader"></div>
      <div class="output">Scanned Result: <span id="scan-result">None</span></div>
    </div>
  </div>

  <script>
    // Generate QR Code
    function generateQR() {
      const canvas = document.getElementById("qr-canvas");
      const text = document.getElementById("qr-input").value.trim();
      if (!text) {
        alert("Please enter text to generate QR code.");
        return;
      }
      QRCode.toCanvas(canvas, text, { width: 200 }, function (error) {
        if (error) console.error(error);
        console.log("QR code generated!");
      });
    }

    // Scan QR Code
    function onScanSuccess(decodedText) {
      document.getElementById("scan-result").textContent = decodedText;
    }

    function onScanError(errorMessage) {
      // Optional: console.log(errorMessage);
    }

    const html5QrCode = new Html5Qrcode("reader");
    Html5Qrcode.getCameras().then(cameras => {
      if (cameras && cameras.length) {
        html5QrCode.start(
          { facingMode: "environment" }, // rear camera
          { fps: 10, qrbox: 250 },
          onScanSuccess,
          onScanError
        );
      } else {
        alert("No camera found.");
      }
    }).catch(err => {
      console.error("Camera error:", err);
    });
  </script>

</body>
</html>
