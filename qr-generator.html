<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Code Generator & Downloader</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      text-align: center;
    }

    .container {
      background: white;
      max-width: 500px;
      margin: auto;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      resize: vertical;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    canvas {
      margin-top: 20px;
      max-width: 100%;
    }

    a#download-link {
      display: block;
      margin-top: 15px;
      text-decoration: none;
      color: #007bff;
      font-weight: bold;
    }

    a#download-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>QR Code Generator</h1>
    <textarea id="qr-input" rows="4" placeholder="Enter text or URL here..."></textarea>
    <button onclick="generateQRCode()">Generate QR Code</button>
    <canvas id="qr-canvas"></canvas>
    <a id="download-link" href="#" download="qr-code.png" style="display: none;">⬇️ Download QR Code</a>
  </div>

  <script>
    function generateQRCode() {
      const text = document.getElementById("qr-input").value.trim();
      const canvas = document.getElementById("qr-canvas");
      const downloadLink = document.getElementById("download-link");

      if (!text) {
        alert("Please enter some text.");
        return;
      }

      QRCode.toCanvas(canvas, text, { width: 250 }, function (error) {
        if (error) {
          console.error(error);
          alert("Error generating QR code.");
          return;
        }

        // Prepare download link
        const dataURL = canvas.toDataURL("image/png");
        downloadLink.href = dataURL;
        downloadLink.style.display = "block";
      });
    }
  </script>

</body>
</html>
