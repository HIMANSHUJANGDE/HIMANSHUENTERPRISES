<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>4 Photo Print - A4</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      padding: 20px;
      margin: 0;
    }

    .controls {
      margin-bottom: 20px;
      text-align: center;
    }

    .controls input {
      margin: 5px;
    }

    .a4 {
      width: 210mm;
      height: 297mm;
      background: white;
      margin: auto;
      padding: 10mm;
      box-shadow: 0 0 5px rgba(0,0,0,0.2);
    }

    .photo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 10mm;
      height: 100%;
    }

    .photo-slot {
      background: #ccc;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .photo-slot img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    @media print {
      body {
        background: none;
        padding: 0;
        margin: 0;
      }

      .controls {
        display: none;
      }

      .a4 {
        box-shadow: none;
        margin: 0;
        page-break-after: always;
      }
    }
  </style>
</head>
<body>

  <div class="controls">
    <input type="file" id="fileInput" accept="image/*" multiple />
    <button onclick="window.print()">Print</button>
  </div>

  <div class="a4" id="printArea">
    <div class="photo-grid">
      <div class="photo-slot"><img id="img1" /></div>
      <div class="photo-slot"><img id="img2" /></div>
      <div class="photo-slot"><img id="img3" /></div>
      <div class="photo-slot"><img id="img4" /></div>
    </div>
  </div>

  <script>
    document.getElementById("fileInput").addEventListener("change", function (e) {
      const files = e.target.files;
      for (let i = 0; i < Math.min(4, files.length); i++) {
        const img = document.getElementById(`img${i + 1}`);
        img.src = URL.createObjectURL(files[i]);
      }
    });
  </script>

</body>
</html>
