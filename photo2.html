<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Passport Photo A4 Printer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      padding: 20px;
      text-align: center;
    }

    .container {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    canvas {
      margin-top: 20px;
      border: 1px solid #ccc;
      max-width: 100%;
    }

    input, button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
    }

    label {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Print Landscape Passport Photos on A4 (Portrait)</h2>
    <label>Number of copies (pcs):</label>
    <input type="number" id="pcsInput" value="50" min="1" max="100">
    <br>
    <input type="file" id="photoInput" accept="image/*">
    <br>
    <canvas id="outputCanvas" width="2480" height="3508"></canvas>
    <br>
    <button id="printBtn">Print</button>
  </div>

  <script>
    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');
    const pcsInput = document.getElementById('pcsInput');
    const photoInput = document.getElementById('photoInput');

    // A4 portrait size at 300 DPI
    const PAGE_WIDTH = 2480;
    const PAGE_HEIGHT = 3508;

    // Photo dimensions: 45mm x 35mm = 531 x 413 px (landscape)
    const PHOTO_WIDTH = 531;
    const PHOTO_HEIGHT = 413;
    const GAP = 20;
    const BORDER_WIDTH = 2;
    const BORDER_COLOR = "#000";

    photoInput.addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (!file) return;

      const pcs = parseInt(pcsInput.value) || 50;

      const reader = new FileReader();
      reader.onload = function (evt) {
        const img = new Image();
        img.onload = function () {
          // Crop image to center square
          const size = Math.min(img.width, img.height);
          const sx = (img.width - size) / 2;
          const sy = (img.height - size) / 2;

          // Resize to landscape passport size
          const tempCanvas = document.createElement('canvas');
          tempCanvas.width = PHOTO_WIDTH;
          tempCanvas.height = PHOTO_HEIGHT;
          const tempCtx = tempCanvas.getContext('2d');
          tempCtx.drawImage(img, sx, sy, size, size, 0, 0, PHOTO_WIDTH, PHOTO_HEIGHT);

          // Clear main canvas
          ctx.fillStyle = '#fff';
          ctx.fillRect(0, 0, PAGE_WIDTH, PAGE_HEIGHT);

          // Calculate how many fit per row/column
          const cols = Math.floor((PAGE_WIDTH + GAP) / (PHOTO_WIDTH + GAP));
          const rows = Math.floor((PAGE_HEIGHT + GAP) / (PHOTO_HEIGHT + GAP));
          const maxPhotos = cols * rows;

          if (pcs > maxPhotos) {
            alert(`Only ${maxPhotos} photos can fit on A4 portrait. Showing ${maxPhotos}.`);
          }

          const total = Math.min(pcs, maxPhotos);
          let placed = 0;
          let y = GAP;

          for (let row = 0; row < rows && placed < total; row++) {
            let x = GAP;
            for (let col = 0; col < cols && placed < total; col++) {
              // Draw border
              ctx.fillStyle = BORDER_COLOR;
              ctx.fillRect(
                x - BORDER_WIDTH,
                y - BORDER_WIDTH,
                PHOTO_WIDTH + BORDER_WIDTH * 2,
                PHOTO_HEIGHT + BORDER_WIDTH * 2
              );

              // Draw photo
              ctx.drawImage(tempCanvas, x, y, PHOTO_WIDTH, PHOTO_HEIGHT);

              placed++;
              x += PHOTO_WIDTH + GAP;
            }
            y += PHOTO_HEIGHT + GAP;
          }
        };
        img.src = evt.target.result;
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('printBtn').addEventListener('click', () => {
      const dataUrl = canvas.toDataURL('image/png');
      const win = window.open('', '_blank');
      win.document.write(`
        <html>
        <head><title>Print Passport Photos</title></head>
        <body style="margin:0;">
          <img src="${dataUrl}" style="width:100%;" onload="window.print(); window.close();">
        </body>
        </html>
      `);
    });
  </script>
</body>
</html>
