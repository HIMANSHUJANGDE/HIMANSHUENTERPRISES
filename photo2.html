<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Small Photo Printer A4</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f8f8f8;
      padding: 20px;
      text-align: center;
    }

    .container {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      display: inline-block;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, button {
      padding: 10px 15px;
      margin: 10px;
      font-size: 16px;
    }

    canvas {
      margin-top: 20px;
      border: 1px solid #ccc;
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Print Smaller Photos (Landscape) on A4</h2>
    <label>Number of copies (pcs):</label>
    <input type="number" id="pcsInput" value="50" min="1" max="100">
    <br>
    <input type="file" id="photoInput" accept="image/*">
    <br>
    <canvas id="outputCanvas" width="2480" height="3508"></canvas>
    <br>
    <button id="printBtn">Print</button>
  </div>

  <script>
    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');

    // Smaller-than-passport photo dimensions (landscape): 40mm x 30mm
    const PHOTO_WIDTH = 472; // 40mm @ 300 DPI
    const PHOTO_HEIGHT = 354; // 30mm @ 300 DPI
    const GAP = 15;
    const BORDER_WIDTH = 2;
    const BORDER_COLOR = "#000";

    const PAGE_WIDTH = 2480; // A4 portrait width (px)
    const PAGE_HEIGHT = 3508; // A4 portrait height (px)

    const photoInput = document.getElementById('photoInput');
    const pcsInput = document.getElementById('pcsInput');

    photoInput.addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (!file) return;

      const pcs = parseInt(pcsInput.value) || 50;

      const reader = new FileReader();
      reader.onload = function (evt) {
        const img = new Image();
        img.onload = function () {
          // Crop to square from center
          const size = Math.min(img.width, img.height);
          const sx = (img.width - size) / 2;
          const sy = (img.height - size) / 2;

          // Create resized temp canvas
          const tempCanvas = document.createElement('canvas');
          tempCanvas.width = PHOTO_WIDTH;
          tempCanvas.height = PHOTO_HEIGHT;
          const tempCtx = tempCanvas.getContext('2d');
          tempCtx.drawImage(img, sx, sy, size, size, 0, 0, PHOTO_WIDTH, PHOTO_HEIGHT);

          // Clear canvas
          ctx.fillStyle = "#fff";
          ctx.fillRect(0, 0, PAGE_WIDTH, PAGE_HEIGHT);

          // Calculate max photos per page
          const cols = Math.floor((PAGE_WIDTH + GAP) / (PHOTO_WIDTH + GAP));
          const rows = Math.floor((PAGE_HEIGHT + GAP) / (PHOTO_HEIGHT + GAP));
          const maxPhotos = cols * rows;

          const count = Math.min(pcs, maxPhotos);
          let placed = 0;
          let y = GAP;

          for (let r = 0; r < rows && placed < count; r++) {
            let x = GAP;
            for (let c = 0; c < cols && placed < count; c++) {
              // Draw border
              ctx.fillStyle = BORDER_COLOR;
              ctx.fillRect(
                x - BORDER_WIDTH,
                y - BORDER_WIDTH,
                PHOTO_WIDTH + BORDER_WIDTH * 2,
                PHOTO_HEIGHT + BORDER_WIDTH * 2
              );

              // Draw photo
              ctx.drawImage(tempCanvas, x, y, PHOTO_WIDTH, PHOTO_HEIGHT);

              placed++;
              x += PHOTO_WIDTH + GAP;
            }
            y += PHOTO_HEIGHT + GAP;
          }

          if (pcs > maxPhotos) {
            alert(`Only ${maxPhotos} photos fit on A4. Showing ${maxPhotos}.`);
          }
        };
        img.src = evt.target.result;
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('printBtn').addEventListener('click', () => {
      const dataUrl = canvas.toDataURL('image/png');
      const win = window.open('', '_blank');
      win.document.write(`
        <html>
          <head><title>Print Small Photos</title></head>
          <body style="margin:0;">
            <img src="${dataUrl}" style="width:100%;" onload="window.print(); window.close();">
          </body>
        </html>
      `);
    });
  </script>
</body>
</html>
