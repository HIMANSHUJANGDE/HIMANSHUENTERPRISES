<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Management System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f4; }
        .container { padding: 20px; }
        .hidden { display: none; }
        .header { text-align: center; margin-bottom: 20px; }
        .form { width: 300px; margin: 0 auto; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .file-list { margin-top: 20px; }
        .file-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .file-item button { background-color: #dc3545; }
        .file-item button:hover { background-color: #c82333; }
        .file-item a { text-decoration: none; color: #007bff; }
    </style>
</head>
<body>

<div class="container">
    <!-- Login Form -->
    <div id="login-form" class="form">
        <h2 class="header">Login</h2>
        <input type="text" id="login-username" placeholder="Username">
        <input type="password" id="login-password" placeholder="Password">
        <button onclick="login()">Login</button>
        <button onclick="showRegisterForm()">Create Account</button>
    </div>

    <!-- Register Form -->
    <div id="register-form" class="form hidden">
        <h2 class="header">Register</h2>
        <input type="text" id="register-username" placeholder="Username">
        <input type="password" id="register-password" placeholder="Password">
        <button onclick="register()">Register</button>
        <button onclick="showLoginForm()">Back to Login</button>
    </div>

    <!-- File Management Form -->
    <div id="file-manager" class="hidden">
        <h2 class="header">File Management</h2>
        <input type="file" id="file-upload">
        <button onclick="uploadFile()">Upload File</button>
        <div class="file-list" id="file-list"></div>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<script>
    // Store current logged-in user
    let currentUser = null;

    // Show login form
    function showLoginForm() {
        document.getElementById("login-form").classList.remove("hidden");
        document.getElementById("register-form").classList.add("hidden");
        document.getElementById("file-manager").classList.add("hidden");
    }

    // Show register form
    function showRegisterForm() {
        document.getElementById("login-form").classList.add("hidden");
        document.getElementById("register-form").classList.remove("hidden");
        document.getElementById("file-manager").classList.add("hidden");
    }

    // Show file management form
    function showFileManager() {
        document.getElementById("login-form").classList.add("hidden");
        document.getElementById("register-form").classList.add("hidden");
        document.getElementById("file-manager").classList.remove("hidden");
        loadFiles();
    }

    // Register new user
    function register() {
        const username = document.getElementById("register-username").value;
        const password = document.getElementById("register-password").value;
        
        if (!username || !password) {
            alert("Please fill out both fields.");
            return;
        }

        const users = JSON.parse(localStorage.getItem("users")) || [];
        if (users.find(user => user.username === username)) {
            alert("User already exists.");
            return;
        }

        users.push({ username, password, files: [] });
        localStorage.setItem("users", JSON.stringify(users));

        alert("Account created! You can now log in.");
        showLoginForm();
    }

    // Login existing user
    function login() {
        const username = document.getElementById("login-username").value;
        const password = document.getElementById("login-password").value;

        if (!username || !password) {
            alert("Please fill out both fields.");
            return;
        }

        const users = JSON.parse(localStorage.getItem("users")) || [];
        const user = users.find(user => user.username === username && user.password === password);

        if (!user) {
            alert("Invalid credentials.");
            return;
        }

        currentUser = user;
        showFileManager();
    }

    // Logout user
    function logout() {
        currentUser = null;
        showLoginForm();
    }

    // Upload file
    function uploadFile() {
        const fileInput = document.getElementById("file-upload");
        const file = fileInput.files[0];

        if (!file) {
            alert("Please select a file to upload.");
            return;
        }

        const reader = new FileReader();
        reader.onload = function(event) {
            const fileData = {
                name: file.name,
                size: file.size,
                type: file.type,
                content: event.target.result
            };
            
            currentUser.files.push(fileData);
            saveUserData();
            loadFiles();
        };
        reader.readAsDataURL(file);  // Read the file as a data URL
    }

    // Delete file
    function deleteFile(index) {
        currentUser.files.splice(index, 1);
        saveUserData();
        loadFiles();
    }

    // Download file
    function downloadFile(index) {
        const file = currentUser.files[index];
        const link = document.createElement("a");
        link.href = file.content;
        link.download = file.name;
        link.click();
    }

    // Save the current user's data to localStorage
    function saveUserData() {
        const users = JSON.parse(localStorage.getItem("users")) || [];
        const updatedUsers = users.map(user =>
            user.username === currentUser.username ? currentUser : user
        );
        localStorage.setItem("users", JSON.stringify(updatedUsers));
    }

    // Load and display the user's files
    function loadFiles() {
        const fileList = document.getElementById("file-list");
        fileList.innerHTML = "";

        currentUser.files.forEach((file, index) => {
            const div = document.createElement("div");
            div.classList.add("file-item");

            div.innerHTML = `
                <span>${file.name} (${(file.size / 1024).toFixed(2)} KB)</span>
                <button onclick="deleteFile(${index})">Delete</button>
                <button onclick="downloadFile(${index})">Download</button>
            `;
            fileList.appendChild(div);
        });
    }

    // Initialize the app
    function init() {
        const users = JSON.parse(localStorage.getItem("users")) || [];
        if (users.length === 0) {
            showRegisterForm();
        } else {
            showLoginForm();
        }
    }

    init();
</script>

</body>
</html>
