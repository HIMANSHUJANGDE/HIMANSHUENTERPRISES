<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Airtel Payments Bank Passbook</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f6f6;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: #fff;
      padding: 30px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    header {
      text-align: center;
      border-bottom: 2px solid #e60000;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }

    .logo {
      height: 60px;
    }

    header h1 {
      color: #e60000;
      margin: 10px 0 5px;
    }

    header h2 {
      font-size: 1.1em;
      color: #333;
    }

    form label {
      display: block;
      margin: 10px 0 5px;
    }

    form input {
      width: 100%;
      padding: 8px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }

    button {
      background-color: #e60000;
      color: white;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      font-size: 1em;
      margin-top: 10px;
    }

    button:hover {
      background-color: #cc0000;
    }

    .passbook {
      display: none;
      border: 2px solid #e60000;
      padding: 20px;
      margin-top: 30px;
    }

    .passbook h3 {
      color: #e60000;
      border-bottom: 1px solid #ccc;
      padding-bottom: 5px;
      margin-bottom: 15px;
    }

    .passbook p {
      margin: 8px 0;
    }

    @media print {
      body {
        background: white;
      }
      form, button#print-btn {
        display: none !important;
      }
      .passbook {
        display: block !important;
        border: none;
        box-shadow: none;
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <img src="https://upload.wikimedia.org/wikipedia/commons/1/1b/Airtel_Logo.png" alt="Airtel Logo" class="logo">
      <h1>Airtel Payments Bank</h1>
      <h2>Passbook - Front Page</h2>
    </header>

    <form id="customer-form">
      <label for="name">Customer Name:</label>
      <input type="text" id="name" required>

      <label for="account">Account Number:</label>
      <input type="text" id="account" required>

      <label for="mobile">Mobile Number:</label>
      <input type="text" id="mobile" required>

      <label for="branch">Branch Name:</label>
      <input type="text" id="branch" required>

      <label for="ifsc">IFSC Code:</label>
      <input type="text" id="ifsc" required>

      <button type="submit">Generate Passbook</button>
    </form>

    <div class="passbook" id="passbook">
      <h3>Customer Details</h3>
      <p><strong>Name:</strong> <span id="pb-name"></span></p>
      <p><strong>Account Number:</strong> <span id="pb-account"></span></p>
      <p><strong>Mobile Number:</strong> <span id="pb-mobile"></span></p>
      <p><strong>Branch:</strong> <span id="pb-branch"></span></p>
      <p><strong>IFSC Code:</strong> <span id="pb-ifsc"></span></p>
      <p><strong>Date of Issue:</strong> <span id="pb-date"></span></p>
      <button id="print-btn" onclick="window.print()">🖨️ Print Passbook</button>
    </div>
  </div>

  <script>
    const form = document.getElementById("customer-form");
    const passbook = document.getElementById("passbook");

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      // Get input values
      document.getElementById("pb-name").innerText = document.getElementById("name").value;
      document.getElementById("pb-account").innerText = document.getElementById("account").value;
      document.getElementById("pb-mobile").innerText = document.getElementById("mobile").value;
      document.getElementById("pb-branch").innerText = document.getElementById("branch").value;
      document.getElementById("pb-ifsc").innerText = document.getElementById("ifsc").value;

      // Add current date
      const today = new Date();
      const formatted = today.toLocaleDateString('en-IN', {
        day: '2-digit', month: 'short', year: 'numeric'
      });
      document.getElementById("pb-date").innerText = formatted;

      // Show passbook section
      passbook.style.display = "block";

      // Scroll to it
      passbook.scrollIntoView({ behavior: "smooth" });
    });
  </script>
</body>
</html>
