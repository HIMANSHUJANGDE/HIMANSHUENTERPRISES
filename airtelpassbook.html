<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Airtel Payments Bank Passbook</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f6f6;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: #fff;
      padding: 30px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    header {
      text-align: center;
      border-bottom: 2px solid #e60000;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }

    .logo {
      height: 60px;
    }

    header h1 {
      color: #e60000;
      margin: 10px 0 5px;
    }

    header h2 {
      font-size: 1.1em;
      color: #333;
    }

    form label {
      display: block;
      margin: 10px 0 5px;
      font-weight: bold;
    }

    form input, form textarea, form select {
      width: 100%;
      padding: 8px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }

    button {
      background-color: #e60000;
      color: white;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      font-size: 1em;
      margin-top: 10px;
    }

    button:hover {
      background-color: #cc0000;
    }

    .passbook {
      display: none;
      border: 2px solid #e60000;
      padding: 20px;
      margin-top: 30px;
    }

    .passbook h3 {
      color: #e60000;
      border-bottom: 1px solid #ccc;
      padding-bottom: 5px;
      margin-bottom: 15px;
    }

    .passbook p {
      margin: 8px 0;
      line-height: 1.4;
    }

    @media print {
      body {
        background: white;
      }

      form, button#print-btn {
        display: none !important;
      }

      .passbook {
        display: block !important;
        border: none;
        box-shadow: none;
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <img src="https://upload.wikimedia.org/wikipedia/commons/1/1b/Airtel_Logo.png" alt="Airtel Logo" class="logo">
      <h1>Airtel Payments Bank</h1>
      <h2>Passbook - Customer Front Page</h2>
    </header>

    <form id="customer-form">
      <label for="name">Full Name:</label>
      <input type="text" id="name" required>

      <label for="father">Father's Name:</label>
      <input type="text" id="father" required>

      <label for="dob">Date of Birth:</label>
      <input type="date" id="dob" required>

      <label for="gender">Gender:</label>
      <select id="gender" required>
        <option value="">Select</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>

      <label for="address">Address:</label>
      <textarea id="address" rows="3" required></textarea>

      <label for="account">Account Number:</label>
      <input type="text" id="account" required>

      <label for="mobile">Mobile Number:</label>
      <input type="text" id="mobile" required>

      <label for="aadhar">Aadhar Number:</label>
      <input type="text" id="aadhar" required>

      <label for="branch">Branch:</label>
      <input type="text" id="branch" required>

      <button type="submit">Generate Passbook</button>
    </form>

    <div class="passbook" id="passbook">
      <h3>Customer Details</h3>
      <p><strong>Name:</strong> <span id="pb-name"></span></p>
      <p><strong>Father's Name:</strong> <span id="pb-father"></span></p>
      <p><strong>Date of Birth:</strong> <span id="pb-dob"></span></p>
      <p><strong>Gender:</strong> <span id="pb-gender"></span></p>
      <p><strong>Address:</strong> <span id="pb-address"></span></p>
      <p><strong>Account Number:</strong> <span id="pb-account"></span></p>
      <p><strong>Mobile Number:</strong> <span id="pb-mobile"></span></p>
      <p><strong>Aadhar Number:</strong> <span id="pb-aadhar"></span></p>
      <p><strong>Branch:</strong> <span id="pb-branch"></span></p>
      <p><strong>IFSC Code:</strong> <span id="pb-ifsc">AIRP0000001</span></p>
      <p><strong>Date of Issue:</strong> <span id="pb-date"></span></p>
      <button id="print-btn" onclick="window.print()">🖨️ Print Passbook</button>
    </div>
  </div>

  <script>
    document.getElementById("customer-form").addEventListener("submit", function(e) {
      e.preventDefault();

      const get = id => document.getElementById(id).value.trim();
      const set = (id, value) => document.getElementById(id).innerText = value;

      set("pb-name", get("name"));
      set("pb-father", get("father"));
      set("pb-dob", get("dob"));
      set("pb-gender", get("gender"));
      set("pb-address", get("address"));
      set("pb-account", get("account"));
      set("pb-mobile", get("mobile"));
      set("pb-aadhar", get("aadhar"));
      set("pb-branch", get("branch"));

      // IFSC is fixed
      set("pb-ifsc", "AIRP0000001");

      // Format today's date
      const today = new Date();
      const formattedDate = today.toLocaleDateString('en-IN', {
        day: '2-digit', month: 'short', year: 'numeric'
      });
      set("pb-date", formattedDate);

      // Show passbook
      document.getElementById("passbook").style.display = "block";
      document.getElementById("passbook").scrollIntoView({ behavior: "smooth" });
    });
  </script>
</body>
</html>
