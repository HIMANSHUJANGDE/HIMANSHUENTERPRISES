<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bank of Baroda Passbook Front Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f2f2f2;
    }
    h1 {
      text-align: center;
      color: #ef6c00;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      justify-content: center;
    }
    form, .preview {
      background: white;
      padding: 20px;
      border: 1px solid #ccc;
      width: 340px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin: 10px 0 5px;
    }
    input {
      width: 100%;
      padding: 6px;
      border: 1px solid #ccc;
    }
    .preview {
      font-size: 14px;
    }
    .preview-header {
      text-align: center;
      margin-bottom: 15px;
    }
    .bob-logo {
      width: 60px;
    }
    .passbook-info {
      border-top: 2px solid #ef6c00;
      padding-top: 10px;
    }
    .info-line {
      margin: 4px 0;
    }
    .print-btn {
      margin-top: 20px;
      background: #ef6c00;
      color: white;
      padding: 10px;
      border: none;
      width: 100%;
      cursor: pointer;
      font-size: 16px;
    }
    @media print {
      body * {
        visibility: hidden;
      }
      .preview, .preview * {
        visibility: visible;
      }
      .preview {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        box-shadow: none;
        border: none;
      }
    }
  </style>
</head>
<body>

  <h1>Bank of Baroda Passbook (Portrait)</h1>
  <div class="container">
    <form id="passbookForm">
      <label>Account Holder Name</label>
      <input type="text" id="accName" required>

      <label>Account Number</label>
      <input type="text" id="accNumber" required>

      <label>Customer ID</label>
      <input type="text" id="custId" required>

      <label>Branch Name</label>
      <input type="text" id="branch" required>

      <label>IFSC Code</label>
      <input type="text" id="ifsc" required>

      <label>MICR Code</label>
      <input type="text" id="micr" required>

      <button type="button" class="print-btn" onclick="printPassbook()">Print Passbook</button>
    </form>

    <div class="preview" id="preview">
      <div class="preview-header">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/e/ed/Bank_of_Baroda_logo.svg/1200px-Bank_of_Baroda_logo.svg.png" class="bob-logo" alt="Bank of Baroda Logo">
        <h2>Bank of Baroda</h2>
      </div>
      <div class="passbook-info">
        <div class="info-line"><strong>Account Holder:</strong> <span id="outName"></span></div>
        <div class="info-line"><strong>Account No:</strong> <span id="outAcc"></span></div>
        <div class="info-line"><strong>Customer ID:</strong> <span id="outCust"></span></div>
        <div class="info-line"><strong>Branch:</strong> <span id="outBranch"></span></div>
        <div class="info-line"><strong>IFSC:</strong> <span id="outIFSC"></span></div>
        <div class="info-line"><strong>MICR:</strong> <span id="outMICR"></span></div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('passbookForm');

    function updatePreview() {
      document.getElementById('outName').innerText = document.getElementById('accName').value;
      document.getElementById('outAcc').innerText = document.getElementById('accNumber').value;
      document.getElementById('outCust').innerText = document.getElementById('custId').value;
      document.getElementById('outBranch').innerText = document.getElementById('branch').value;
      document.getElementById('outIFSC').innerText = document.getElementById('ifsc').value;
      document.getElementById('outMICR').innerText = document.getElementById('micr').value;
    }

    form.addEventListener('input', updatePreview);

    function printPassbook() {
      updatePreview();
      window.print();
    }

    // Initial preview setup
    updatePreview();
  </script>

</body>
</html>
