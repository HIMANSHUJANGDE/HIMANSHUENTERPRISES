<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BC Point - Passbook Front Page</title>
  <style>
    @page {
      size: A5 portrait;
      margin: 15mm;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f2f2f2;
    }

    .container {
      max-width: 450px;
      margin: auto;
      background: #fff;
      padding: 20px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      border-radius: 4px;
    }

    h2 {
      text-align: center;
      color: #e65100;
      margin-bottom: 15px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
      font-size: 14px;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      font-size: 14px;
      margin-top: 4px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      margin-top: 15px;
      background-color: #e65100;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      font-size: 16px;
      cursor: pointer;
    }

    .passbook {
      display: none;
    }

    @media print {
      body {
        background: none;
        padding: 0;
      }

      .container {
        display: none;
      }

      .passbook {
        display: block;
        padding: 20px;
        width: 100%;
        box-sizing: border-box;
      }

      .logo {
        height: 50px;
      }

      .bank-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .bank-title {
        color: #e65100;
        font-size: 18px;
        font-weight: bold;
        text-align: right;
      }

      .info {
        margin-top: 20px;
        font-size: 14px;
        line-height: 1.6;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>BC Point - Passbook Front Page</h2>

    <label>Account Holder Name</label>
    <input id="holder" required />

    <label>Father's Name</label>
    <input id="father" />

    <label>Account Number</label>
    <input id="account" />

    <label>Customer ID</label>
    <input id="custid" />

    <label>Branch Name</label>
    <input id="branch" />

    <label>IFSC Code</label>
    <input id="ifsc" />

    <label>Mobile Number</label>
    <input id="mobile" />

    <label>Address</label>
    <textarea id="address" rows="3"></textarea>

    <button onclick="generatePassbook()">Generate & Print Passbook</button>
  </div>

  <div class="passbook" id="printArea">
    <div class="bank-header">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Bank_of_Baroda_logo.svg/512px-Bank_of_Baroda_logo.svg.png" class="logo" alt="Bank Logo" />
      <div class="bank-title">
        Bank of Baroda<br />
        <span style="font-size: 12px;">BC Point / Bank Mitra</span>
      </div>
    </div>

    <div class="info">
      <strong>Account Holder:</strong> <span id="pholder"></span><br />
      <strong>Father's Name:</strong> <span id="pfather"></span><br />
      <strong>Account Number:</strong> <span id="paccount"></span><br />
      <strong>Customer ID:</strong> <span id="pcustid"></span><br />
      <strong>Branch Name:</strong> <span id="pbranch"></span><br />
      <strong>IFSC Code:</strong> <span id="pifsc"></span><br />
      <strong>Mobile Number:</strong> <span id="pmobile"></span><br />
      <strong>Address:</strong> <span id="paddress"></span><br />
      <strong>Date of Print:</strong> <span id="pdate"></span>
    </div>
  </div>

  <script>
    function generatePassbook() {
      // Fill values
      document.getElementById("pholder").textContent = document.getElementById("holder").value;
      document.getElementById("pfather").textContent = document.getElementById("father").value;
      document.getElementById("paccount").textContent = document.getElementById("account").value;
      document.getElementById("pcustid").textContent = document.getElementById("custid").value;
      document.getElementById("pbranch").textContent = document.getElementById("branch").value;
      document.getElementById("pifsc").textContent = document.getElementById("ifsc").value;
      document.getElementById("pmobile").textContent = document.getElementById("mobile").value;
      document.getElementById("paddress").textContent = document.getElementById("address").value;
      document.getElementById("pdate").textContent = new Date().toLocaleDateString();

      // Trigger print
      window.print();
    }
  </script>

</body>
</html>
