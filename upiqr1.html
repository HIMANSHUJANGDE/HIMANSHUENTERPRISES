<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PhonePe UPI QR Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e5f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #fff;
      padding: 30px 20px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      text-align: center;
      width: 320px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 94%;
      padding: 12px;
      margin-top: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }

    #qrcode {
      margin: 20px auto;
    }

    .status {
      margin-top: 15px;
      font-weight: bold;
    }

    .status.waiting {
      color: orange;
    }

    .status.paid {
      color: green;
    }

    .status.failed {
      color: red;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>PhonePe UPI QR</h2>
    <input type="text" id="upiId" placeholder="Enter UPI ID (e.g. name@upi)" />
    <input type="number" id="amount" placeholder="Enter Amount (₹)" />
    <button onclick="generateQRCode()">Generate QR Code</button>
    <div id="qrcode"></div>
    <div class="status waiting" id="statusMsg" style="display: none;">Awaiting payment...</div>
    <button id="markPaidBtn" style="display:none;" onclick="markAsPaid()">Mark as Paid</button>
  </div>

  <!-- QRCode.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

  <script>
    function generateQRCode() {
      const upiId = document.getElementById("upiId").value.trim();
      const amount = document.getElementById("amount").value.trim();
      const statusMsg = document.getElementById("statusMsg");
      const markPaidBtn = document.getElementById("markPaidBtn");

      if (!upiId || !upiId.includes('@')) {
        alert("Please enter a valid UPI ID (e.g. name@upi)");
        return;
      }

      // Build UPI payment URL
      const upiUrl = `upi://pay?pa=${encodeURIComponent(upiId)}&pn=UPI%20User&am=${amount}&cu=INR`;

      // Clear existing QR code
      document.getElementById("qrcode").innerHTML = "";

      // Generate QR Code
      new QRCode(document.getElementById("qrcode"), {
        text: upiUrl,
        width: 256,
        height: 256,
      });

      // Show status
      statusMsg.innerText = "Awaiting payment...";
      statusMsg.className = "status waiting";
      statusMsg.style.display = "block";
      markPaidBtn.style.display = "inline-block";
    }

    function markAsPaid() {
      const statusMsg = document.getElementById("statusMsg");
      statusMsg.innerText = "✅ Payment received!";
      statusMsg.className = "status paid";
    }
  </script>
</body>
</html>
