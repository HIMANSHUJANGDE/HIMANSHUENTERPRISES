<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Paytm UPI QR Code Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    h2 {
      color: #00baf2;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      font-size: 16px;
    }

    button {
      padding: 12px;
      width: 100%;
      background-color: #00baf2;
      color: white;
      border: none;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    .simulate {
      background-color: #0070c0;
    }

    #qrcode {
      margin: 20px auto;
    }

    #status {
      display: none;
      margin-top: 15px;
      color: green;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Paytm UPI QR Generator</h2>
  <input type="number" id="amount" placeholder="Enter Amount (INR)">
  <button onclick="generateQR()">Generate QR</button>

  <div id="qrcode"></div>

  <div id="status">✅ Payment Received</div>
  <button class="simulate" onclick="simulatePayment()">Simulate Payment Notification</button>
</div>

<script>
  // Set your Paytm UPI ID (VPA) here
  const paytmUPI_ID = "yourmobile@paytm"; // Replace with your actual Paytm UPI ID

  function generateQR() {
    const amount = document.getElementById("amount").value.trim();
    const qrcodeDiv = document.getElementById("qrcode");
    const status = document.getElementById("status");

    if (!amount || parseFloat(amount) <= 0) {
      alert("Please enter a valid amount.");
      return;
    }

    // Construct UPI URL
    const upiURL = `upi://pay?pa=${encodeURIComponent(paytmUPI_ID)}&pn=Paytm%20Merchant&am=${encodeURIComponent(amount)}&cu=INR`;

    // Clear any previous QR
    qrcodeDiv.innerHTML = "";

    // Generate QR
    new QRCode(qrcodeDiv, {
      text: upiURL,
      width: 200,
      height: 200,
      colorDark: "#000000",
      colorLight: "#ffffff"
    });

    status.style.display = "none";
  }

  function simulatePayment() {
    document.getElementById("status").style.display = "block";
  }
</script>

</body>
</html>
