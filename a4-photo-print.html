<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>A4 Photo Printing (Auto Grid)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      text-align: center;
    }

    .controls {
      margin-bottom: 20px;
    }

    .a4-sheet {
      width: 21cm;
      height: 29.7cm;
      margin: 0 auto;
      padding: 1cm;
      box-sizing: border-box;
      background: white;
      border: 1px solid #000;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(6cm, 1fr));
      grid-auto-rows: 8cm;
      gap: 1cm;
      overflow: hidden;
    }

    .photo-box {
      border: 3px solid #333;
      padding: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9f9f9;
    }

    .photo-box img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    @media print {
      body * {
        visibility: hidden;
      }

      .a4-sheet, .a4-sheet * {
        visibility: visible;
      }

      .a4-sheet {
        position: absolute;
        top: 0;
        left: 0;
      }

      .controls {
        display: none;
      }
    }
  </style>
</head>
<body>

  <div class="controls">
    <input type="file" id="imageInput" accept="image/*" multiple>
    <button onclick="window.print()">🖨️ Print A4</button>
  </div>

  <div class="a4-sheet" id="a4Sheet">
    <!-- Images will appear here -->
  </div>

  <script>
    const imageInput = document.getElementById('imageInput');
    const a4Sheet = document.getElementById('a4Sheet');

    imageInput.addEventListener('change', function (e) {
      a4Sheet.innerHTML = ''; // Clear existing photos
      const files = Array.from(e.target.files);

      files.forEach(file => {
        if (file.type.startsWith('image/')) {
          const reader = new FileReader();
          reader.onload = function (event) {
            const img = document.createElement('img');
            img.src = event.target.result;

            const box = document.createElement('div');
            box.className = 'photo-box';
            box.appendChild(img);

            a4Sheet.appendChild(box);
          };
          reader.readAsDataURL(file);
        }
      });
    });
  </script>

</body>
</html>
