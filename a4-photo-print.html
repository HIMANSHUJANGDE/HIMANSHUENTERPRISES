<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>A4 Photo Printer</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    .a4-container {
      width: 21cm;
      height: 29.7cm;
      margin: 0 auto;
      border: 1px solid #000;
      position: relative;
      background: white;
      overflow: hidden;
    }

    .photo-wrapper {
      position: absolute;
      top: 1cm;
      left: 1cm;
      right: 1cm;
      bottom: 1cm;
      border: 5px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
    }

    .photo-wrapper img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .controls {
      margin-bottom: 20px;
    }

    @media print {
      body * {
        visibility: hidden;
      }

      .a4-container, .a4-container * {
        visibility: visible;
      }

      .a4-container {
        position: absolute;
        top: 0;
        left: 0;
      }

      .controls {
        display: none;
      }
    }
  </style>
</head>
<body>

  <div class="controls">
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="window.print()">Print A4</button>
  </div>

  <div class="a4-container" id="a4Container">
    <div class="photo-wrapper" id="photoWrapper">
      <img id="photo" src="" alt="Your Photo">
    </div>
  </div>

  <script>
    const imageInput = document.getElementById('imageInput');
    const photo = document.getElementById('photo');

    imageInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file && file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = function(event) {
          photo.src = event.target.result;
        };
        reader.readAsDataURL(file);
      }
    });
  </script>

</body>
</html>
