<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Photo Print AIO (45 Max)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      padding: 20px;
      text-align: center;
    }

    .controls {
      margin-bottom: 20px;
    }

    .photo-inputs {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      max-height: 300px;
      overflow: auto;
      padding: 10px;
      background: #fff;
      border: 1px solid #ccc;
    }

    .photo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fafafa;
      padding: 8px 12px;
      border-radius: 5px;
      box-shadow: 0 0 3px rgba(0,0,0,0.1);
    }

    input[type="number"], select {
      padding: 4px;
    }

    .a4 {
      width: 210mm;
      height: 297mm;
      background: white;
      box-shadow: 0 0 6px rgba(0,0,0,0.2);
      padding: 10mm;
      box-sizing: border-box;
      display: flex;
      flex-wrap: wrap;
      gap: 3mm;
      justify-content: flex-start;
      align-content: flex-start;
      margin: auto;
    }

    .photo {
      border: 0.2mm solid #ccc;
      padding: 1mm;
      background: #fff;
      object-fit: cover;
      box-sizing: border-box;
    }

    @media print {
      body {
        margin: 0;
        padding: 0;
        background: none;
      }

      .controls {
        display: none;
      }

      .a4 {
        box-shadow: none;
        padding: 0;
      }

      .photo {
        border: none;
        padding: 0;
      }
    }
  </style>
</head>
<body>

  <h2>🖼️ A4 Photo Print Tool (Max 45 Photos)</h2>

  <div class="controls">
    <input type="file" id="photoUpload" accept="image/*" multiple><br><br>

    <label>Photo Size:</label>
    <select id="sizeSelect">
      <option value="passport">Passport (35x45mm)</option>
      <option value="small">Small (25x35mm)</option>
    </select>

    <button onclick="preparePhotos()">📝 Set Copies & Orientation</button>

    <div class="photo-inputs" id="photoInputs"></div>

    <button onclick="generateLayout()">📄 Generate Layout</button>
    <button onclick="window.print()">🖨️ Print</button>
  </div>

  <div class="a4" id="printArea"></div>

  <script>
    const mmToPx = mm => mm * 3.78;
    let imageFiles = [];

    document.getElementById("photoUpload").addEventListener("change", function () {
      imageFiles = Array.from(this.files).slice(0, 45);
      document.getElementById("photoInputs").innerHTML = '';
    });

    function preparePhotos() {
      const container = document.getElementById("photoInputs");
      container.innerHTML = '';

      if (imageFiles.length === 0) {
        alert("Please upload photos first.");
        return;
      }

      imageFiles.forEach((file, index) => {
        const reader = new FileReader();
        reader.onload = function (e) {
          const row = document.createElement("div");
          row.className = "photo-row";

          const img = document.createElement("img");
          img.src = e.target.result;
          img.width = 60;
          img.height = 60;

          const pcsInput = document.createElement("input");
          pcsInput.type = "number";
          pcsInput.min = 1;
          pcsInput.max = 45;
          pcsInput.value = 1;
          pcsInput.dataset.index = index;

          const orientSelect = document.createElement("select");
          orientSelect.dataset.index = index;
          orientSelect.innerHTML = `
            <option value="portrait">Portrait</option>
            <option value="landscape">Landscape</option>
          `;

          row.appendChild(img);
          row.appendChild(document.createTextNode("Copies:"));
          row.appendChild(pcsInput);
          row.appendChild(document.createTextNode("Orientation:"));
          row.appendChild(orientSelect);
          container.appendChild(row);
        };
        reader.readAsDataURL(file);
      });
    }

    function generateLayout() {
      const printArea = document.getElementById("printArea");
      printArea.innerHTML = "";

      const size = document.getElementById("sizeSelect").value;
      let wMM = size === "passport" ? 35 : 25;
      let hMM = size === "passport" ? 45 : 35;

      const photoRows = document.querySelectorAll(".photo-row");
      const totalPhotos = [];

      let totalCount = 0;

      photoRows.forEach(row => {
        const pcs = parseInt(row.querySelector("input[type='number']").value) || 0;
        const orient = row.querySelector("select").value;
        const index = parseInt(row.querySelector("input[type='number']").dataset.index);
        const file = imageFiles[index];

        if (totalCount + pcs > 45) {
          alert("Total photo count must not exceed 45.");
          return;
        }

        const reader = new FileReader();
        reader.onload = function (e) {
          for (let i = 0; i < pcs; i++) {
            totalPhotos.push({
              src: e.target.result,
              orientation: orient
            });

            if (totalPhotos.length === (totalCount + pcs)) {
              if (totalPhotos.length === photoRows.length * pcs || totalPhotos.length === 45) {
                layoutPhotos(totalPhotos, wMM, hMM);
              }
            }
          }
        };
        reader.readAsDataURL(file);

        totalCount += pcs;
      });
    }

    function layoutPhotos(images, wMM, hMM) {
      const area = document.getElementById("printArea");
      area.innerHTML = "";

      images.forEach(photo => {
        const img = document.createElement("img");
        img.src = photo.src;
        img.className = "photo";

        const width = photo.orientation === "landscape" ? hMM : wMM;
        const height = photo.orientation === "landscape" ? wMM : hMM;

        img.width = mmToPx(width);
        img.height = mmToPx(height);

        area.appendChild(img);
      });
    }
  </script>

</body>
</html>
