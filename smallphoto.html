<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced Photo Print (AIO)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      text-align: center;
    }

    .controls {
      margin-bottom: 20px;
    }

    .photo-inputs {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .photo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 5px;
    }

    input[type="number"], select {
      padding: 4px;
    }

    .a4 {
      width: 210mm;
      height: 297mm;
      background: white;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
      margin: 20px auto;
      padding: 10mm;
      box-sizing: border-box;
      display: flex;
      flex-wrap: wrap;
      gap: 3mm;
      justify-content: flex-start;
      align-content: flex-start;
    }

    .photo {
      border: 0.2mm dashed #888;
      padding: 1mm;
      background: #fff;
      box-sizing: border-box;
      object-fit: cover;
    }

    @media print {
      body {
        background: none;
        margin: 0;
      }

      .controls {
        display: none;
      }

      .a4 {
        box-shadow: none;
        padding: 0;
      }

      .photo {
        border: none;
        padding: 0;
      }
    }
  </style>
</head>
<body>

  <h2>🖼️ Print Up to 45 Photos on A4 (Portrait or Landscape)</h2>

  <div class="controls">
    <input type="file" id="photoUpload" accept="image/*" multiple><br><br>

    <label>Photo Size:</label>
    <select id="sizeSelect">
      <option value="passport">Passport (35x45mm)</option>
      <option value="small">Small (25x35mm)</option>
    </select>

    <label>Orientation:</label>
    <select id="orientationSelect">
      <option value="portrait">Portrait</option>
      <option value="landscape">Landscape</option>
    </select>

    <button onclick="preparePhotos()">Set Copies</button>

    <div class="photo-inputs" id="photoInputs"></div>

    <button onclick="generateLayout()">Generate Layout</button>
    <button onclick="window.print()">🖨️ Print</button>
  </div>

  <div class="a4" id="printArea"></div>

  <script>
    const mmToPx = mm => mm * 3.78;
    let imageFiles = [];

    document.getElementById("photoUpload").addEventListener("change", function (event) {
      imageFiles = Array.from(event.target.files).slice(0, 45); // max 45 files
      document.getElementById("photoInputs").innerHTML = '';
    });

    function preparePhotos() {
      const inputContainer = document.getElementById("photoInputs");
      inputContainer.innerHTML = '';

      if (imageFiles.length === 0) {
        alert("Please upload photos first.");
        return;
      }

      imageFiles.forEach((file, index) => {
        const reader = new FileReader();
        reader.onload = function (e) {
          const row = document.createElement("div");
          row.className = "photo-row";

          const img = document.createElement("img");
          img.src = e.target.result;
          img.width = 60;
          img.height = 60;
          img.style.objectFit = 'cover';

          const label = document.createElement("label");
          label.textContent = `Copies: `;

          const input = document.createElement("input");
          input.type = "number";
          input.min = 1;
          input.max = 45;
          input.value = 1;
          input.dataset.index = index;

          row.appendChild(img);
          row.appendChild(label);
          row.appendChild(input);
          inputContainer.appendChild(row);
        };
        reader.readAsDataURL(file);
      });
    }

    function generateLayout() {
      const printArea = document.getElementById("printArea");
      const selectedSize = document.getElementById("sizeSelect").value;
      const orientation = document.getElementById("orientationSelect").value;
      const inputContainer = document.getElementById("photoInputs");

      printArea.innerHTML = "";

      // Size
      let widthMM = 35, heightMM = 45;
      if (selectedSize === "small") {
        widthMM = 25;
        heightMM = 35;
      }

      // Swap for landscape
      if (orientation === "landscape") {
        [widthMM, heightMM] = [heightMM, widthMM];
      }

      const widthPx = mmToPx(widthMM);
      const heightPx = mmToPx(heightMM);

      const inputs = inputContainer.querySelectorAll("input[type='number']");
      let total = 0;
      const imagesToPrint = [];

      inputs.forEach(input => {
        const count = parseInt(input.value) || 0;
        const index = parseInt(input.dataset.index);
        const file = imageFiles[index];

        total += count;
        if (total > 45) {
          alert("Total photo count exceeds 45.");
          return;
        }

        const reader = new FileReader();
        reader.onload = function (e) {
          for (let i = 0; i < count; i++) {
            imagesToPrint.push(e.target.result);
            if (imagesToPrint.length === total) {
              layoutPhotos(imagesToPrint, widthPx, heightPx);
            }
          }
        };
        reader.readAsDataURL(file);
      });
    }

    function layoutPhotos(images, widthPx, heightPx) {
      const printArea = document.getElementById("printArea");
      printArea.innerHTML = "";
      images.forEach(src => {
        const img = document.createElement("img");
        img.src = src;
        img.className = "photo";
        img.width = widthPx;
        img.height = heightPx;
        printArea.appendChild(img);
      });
    }
  </script>

</body>
</html>
