<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Passport/Small Photo Print - 45 AIO</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
      text-align: center;
    }

    .controls {
      margin-bottom: 20px;
    }

    .photo-inputs {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .photo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      box-shadow: 0 0 4px rgba(0,0,0,0.1);
    }

    input[type="number"], select {
      padding: 4px;
    }

    .a4 {
      width: 210mm;
      height: 297mm;
      background: white;
      margin: 20px auto;
      box-shadow: 0 0 6px rgba(0,0,0,0.2);
      padding: 10mm;
      box-sizing: border-box;
      display: flex;
      flex-wrap: wrap;
      gap: 3mm;
      justify-content: flex-start;
      align-content: flex-start;
    }

    .photo {
      border: 0.2mm dashed #888;
      padding: 1mm;
      box-sizing: border-box;
      background: #fff;
      object-fit: cover;
    }

    @media print {
      body {
        margin: 0;
        background: none;
      }

      .controls {
        display: none;
      }

      .a4 {
        box-shadow: none;
        padding: 0;
      }

      .photo {
        border: none;
        padding: 0;
      }
    }
  </style>
</head>
<body>

  <h2>🖨️ Photo Printing on A4 (up to 45 pcs)</h2>

  <div class="controls">
    <input type="file" id="photoUpload" accept="image/*" multiple><br><br>

    <label>Photo Size:</label>
    <select id="sizeSelect">
      <option value="passport">Passport (35x45mm)</option>
      <option value="small">Small (25x35mm)</option>
    </select>

    <button onclick="preparePhotos()">Set Copies + Orientation</button>

    <div class="photo-inputs" id="photoInputs"></div>

    <button onclick="generateLayout()">🧱 Generate Layout</button>
    <button onclick="window.print()">🖨️ Print</button>
  </div>

  <div class="a4" id="printArea"></div>

  <script>
    const mmToPx = mm => mm * 3.78;
    let imageFiles = [];

    document.getElementById("photoUpload").addEventListener("change", function (event) {
      imageFiles = Array.from(event.target.files).slice(0, 45);
      document.getElementById("photoInputs").innerHTML = '';
    });

    function preparePhotos() {
      const inputContainer = document.getElementById("photoInputs");
      inputContainer.innerHTML = '';

      if (imageFiles.length === 0) {
        alert("Please upload at least one photo.");
        return;
      }

      imageFiles.forEach((file, index) => {
        const reader = new FileReader();
        reader.onload = function (e) {
          const row = document.createElement("div");
          row.className = "photo-row";

          const img = document.createElement("img");
          img.src = e.target.result;
          img.width = 60;
          img.height = 60;
          img.style.objectFit = 'cover';

          const pcsLabel = document.createElement("label");
          pcsLabel.textContent = "Copies:";

          const pcsInput = document.createElement("input");
          pcsInput.type = "number";
          pcsInput.min = 1;
          pcsInput.max = 45;
          pcsInput.value = 1;
          pcsInput.dataset.index = index;

          const orientLabel = document.createElement("label");
          orientLabel.textContent = "Orientation:";

          const orientSelect = document.createElement("select");
          orientSelect.dataset.index = index;
          const optP = document.createElement("option");
          optP.value = "portrait";
          optP.text = "Portrait";
          const optL = document.createElement("option");
          optL.value = "landscape";
          optL.text = "Landscape";
          orientSelect.appendChild(optP);
          orientSelect.appendChild(optL);

          row.appendChild(img);
          row.appendChild(pcsLabel);
          row.appendChild(pcsInput);
          row.appendChild(orientLabel);
          row.appendChild(orientSelect);
          inputContainer.appendChild(row);
        };
        reader.readAsDataURL(file);
      });
    }

    function generateLayout() {
      const printArea = document.getElementById("printArea");
      const selectedSize = document.getElementById("sizeSelect").value;
      const inputContainer = document.getElementById("photoInputs");

      printArea.innerHTML = "";

      let baseWidth = 35, baseHeight = 45;
      if (selectedSize === "small") {
        baseWidth = 25;
        baseHeight = 35;
      }

      const inputs = inputContainer.querySelectorAll("input[type='number']");
      const orientationInputs = inputContainer.querySelectorAll("select");

      let total = 0;
      const photoQueue = [];

      inputs.forEach((pcsInput, i) => {
        const count = parseInt(pcsInput.value) || 0;
        const index = parseInt(pcsInput.dataset.index);
        const orientation = orientationInputs[i].value;

        if (count > 0 && imageFiles[index]) {
          total += count;
          if (total > 45) {
            alert("Maximum total photo count is 45.");
            return;
          }

          const reader = new FileReader();
          reader.onload = function (e) {
            for (let j = 0; j < count; j++) {
              photoQueue.push({
                src: e.target.result,
                orientation: orientation
              });

              if (photoQueue.length === total) {
                layoutPhotos(photoQueue, baseWidth, baseHeight);
              }
            }
          };
          reader.readAsDataURL(imageFiles[index]);
        }
      });
    }

    function layoutPhotos(images, widthMM, heightMM) {
      const printArea = document.getElementById("printArea");
      printArea.innerHTML = "";

      images.forEach(photo => {
        const img = document.createElement("img");
        img.src = photo.src;
        img.className = "photo";

        const w = photo.orientation === 'landscape' ? heightMM : widthMM;
        const h = photo.orientation === 'landscape' ? widthMM : heightMM;

        img.width = mmToPx(w);
        img.height = mmToPx(h);

        printArea.appendChild(img);
      });
    }
  </script>

</body>
</html>
