<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Landscape Photo Print - AIO</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      text-align: center;
    }

    .controls {
      margin-bottom: 20px;
    }

    .photo-inputs {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      max-height: 300px;
      overflow-y: auto;
      margin-top: 10px;
      border: 1px solid #ccc;
      background: #fff;
      padding: 10px;
    }

    .photo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fafafa;
      padding: 10px;
      border-radius: 6px;
      width: 90%;
    }

    input[type="number"] {
      width: 60px;
    }

    .a4-landscape {
      width: 297mm;
      height: 210mm;
      background: white;
      margin: 20px auto;
      box-shadow: 0 0 6px rgba(0,0,0,0.2);
      padding: 10mm;
      box-sizing: border-box;
      display: flex;
      flex-wrap: wrap;
      gap: 3mm;
      justify-content: flex-start;
      align-content: flex-start;
    }

    .photo {
      border: 0.2mm solid #888;
      padding: 1mm;
      background: #fff;
      object-fit: cover;
      box-sizing: border-box;
    }

    @media print {
      body {
        margin: 0;
        background: none;
      }

      .controls {
        display: none;
      }

      .a4-landscape {
        box-shadow: none;
        padding: 0;
        margin: 0;
      }

      .photo {
        border: none;
        padding: 0;
      }
    }
  </style>
</head>
<body>

  <h2>🖨️ Print Photos (Landscape Layout on A4)</h2>

  <div class="controls">
    <input type="file" id="photoUpload" accept="image/*" multiple><br><br>

    <label>Photo Size:</label>
    <select id="sizeSelect">
      <option value="passport">Passport (35x45mm)</option>
      <option value="small">Small (25x35mm)</option>
    </select>

    <button onclick="preparePhotos()">Set Copies</button>
    <div class="photo-inputs" id="photoInputs"></div>
    <br>
    <button onclick="generateLayout()">📄 Generate Layout</button>
    <button onclick="window.print()">🖨️ Print</button>
  </div>

  <div class="a4-landscape" id="printArea"></div>

  <script>
    const mmToPx = mm => mm * 3.78;
    let imageFiles = [];

    document.getElementById("photoUpload").addEventListener("change", function () {
      imageFiles = Array.from(this.files).slice(0, 45); // max 45 files
      document.getElementById("photoInputs").innerHTML = '';
    });

    function preparePhotos() {
      const inputContainer = document.getElementById("photoInputs");
      inputContainer.innerHTML = '';

      if (imageFiles.length === 0) {
        alert("Please upload at least one photo.");
        return;
      }

      imageFiles.forEach((file, index) => {
        const reader = new FileReader();
        reader.onload = function (e) {
          const row = document.createElement("div");
          row.className = "photo-row";

          const img = document.createElement("img");
          img.src = e.target.result;
          img.width = 60;
          img.height = 45;
          img.style.objectFit = "cover";

          const label = document.createElement("label");
          label.textContent = "Copies:";

          const input = document.createElement("input");
          input.type = "number";
          input.min = 1;
          input.max = 45;
          input.value = 1;
          input.dataset.index = index;

          row.appendChild(img);
          row.appendChild(label);
          row.appendChild(input);
          inputContainer.appendChild(row);
        };
        reader.readAsDataURL(file);
      });
    }

    function generateLayout() {
      const printArea = document.getElementById("printArea");
      printArea.innerHTML = '';

      const size = document.getElementById("sizeSelect").value;
      let widthMM = size === "passport" ? 45 : 35;
      let heightMM = size === "passport" ? 35 : 25; // rotated for landscape

      const photoInputs = document.querySelectorAll(".photo-row input[type='number']");
      let total = 0;
      const photoQueue = [];

      photoInputs.forEach(input => {
        const count = parseInt(input.value) || 0;
        const index = parseInt(input.dataset.index);
        const file = imageFiles[index];

        if (total + count > 45) {
          alert("Total photo count exceeds 45. Please adjust.");
          return;
        }

        const reader = new FileReader();
        reader.onload = function (e) {
          for (let i = 0; i < count; i++) {
            photoQueue.push(e.target.result);
            if (photoQueue.length === total + count) {
              layoutPhotos(photoQueue, widthMM, heightMM);
            }
          }
        };
        reader.readAsDataURL(file);

        total += count;
      });
    }

    function layoutPhotos(images, widthMM, heightMM) {
      const printArea = document.getElementById("printArea");
      printArea.innerHTML = '';

      const widthPx = mmToPx(widthMM);
      const heightPx = mmToPx(heightMM);

      images.forEach(src => {
        const img = document.createElement("img");
        img.src = src;
        img.className = "photo";
        img.width = widthPx;
        img.height = heightPx;
        printArea.appendChild(img);
      });
    }
  </script>

</body>
</html>
