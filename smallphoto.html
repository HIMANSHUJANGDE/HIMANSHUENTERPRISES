<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Multi-Photo Printing AIO</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
      text-align: center;
    }

    .controls {
      margin-bottom: 20px;
    }

    .a4 {
      width: 210mm;
      height: 297mm;
      background: white;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
      padding: 10mm;
      margin: auto;
      box-sizing: border-box;
      display: flex;
      flex-wrap: wrap;
      gap: 3mm;
      justify-content: flex-start;
      align-content: flex-start;
    }

    .photo {
      border: 0.2mm dashed #888;
      padding: 1mm;
      background: #fff;
      box-sizing: border-box;
    }

    @media print {
      body {
        background: none;
        margin: 0;
        padding: 0;
      }

      .controls {
        display: none;
      }

      .a4 {
        box-shadow: none;
        border: none;
        padding: 0;
      }

      .photo {
        border: none;
        padding: 0;
      }
    }
  </style>
</head>
<body>

  <h2>🖼️ Multi-Photo Print (Up to 45) on A4</h2>

  <div class="controls">
    <input type="file" id="photoUpload" accept="image/*" multiple>
    <select id="sizeSelect">
      <option value="passport">Passport (35x45mm)</option>
      <option value="small">Small (25x35mm)</option>
    </select>
    <button onclick="generateLayout()">Generate Layout</button>
    <button onclick="window.print()">🖨️ Print</button>
  </div>

  <div class="a4" id="printArea"></div>

  <script>
    let uploadedImages = [];

    const mmToPx = (mm) => mm * 3.78;

    document.getElementById("photoUpload").addEventListener("change", function (event) {
      uploadedImages = [];
      const files = Array.from(event.target.files).slice(0, 45); // limit to 45

      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = function (e) {
          uploadedImages.push(e.target.result);
        };
        reader.readAsDataURL(file);
      });
    });

    function generateLayout() {
      const printArea = document.getElementById("printArea");
      const selectedSize = document.getElementById("sizeSelect").value;

      printArea.innerHTML = "";

      if (uploadedImages.length === 0) {
        alert("Please upload up to 45 images.");
        return;
      }

      // Set size
      let widthMM = 35, heightMM = 45;
      if (selectedSize === "small") {
        widthMM = 25;
        heightMM = 35;
      }

      const widthPx = mmToPx(widthMM);
      const heightPx = mmToPx(heightMM);
      const totalPhotos = Math.min(uploadedImages.length, 45);

      for (let i = 0; i < totalPhotos; i++) {
        const img = document.createElement("img");
        img.src = uploadedImages[i];
        img.className = "photo";
        img.width = widthPx;
        img.height = heightPx;
        printArea.appendChild(img);
      }
    }
  </script>

</body>
</html>
