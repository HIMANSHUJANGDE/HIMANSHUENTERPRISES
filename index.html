<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smaller-than-Passport Photo Printing System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }

        .container {
            width: 100%;
            text-align: center;
        }

        .upload-section {
            margin: 20px 0;
        }

        input[type="file"] {
            padding: 10px;
            font-size: 16px;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr); /* 9 columns */
            grid-template-rows: repeat(5, 1fr); /* 5 rows */
            grid-gap: 0; /* No gap between images */
            justify-items: center;
            margin-top: 0;
        }

        .photo-item {
            position: relative;
            width: 35mm; /* Slightly smaller than passport size */
            height: 45mm;
            border: 1px solid #000;
            overflow: hidden;
            background-color: #fff;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .print-button {
            margin-top: 30px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }

        @media print {
            body {
                margin: 0;
                padding: 0;
            }

            .container {
                text-align: left;
                width: 100%;
            }

            .photo-grid {
                grid-template-columns: repeat(9, 1fr);
                grid-template-rows: repeat(5, 1fr);
                grid-gap: 0;
                justify-items: center;
            }

            .photo-item {
                width: 35mm;
                height: 45mm;
                border: 1px solid #000;
            }

            .photo-item img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Smaller-than-Passport Photo Printing System</h1>

        <div class="upload-section">
            <input type="file" id="photoInput" accept="image/*" multiple>
        </div>

        <div class="photo-grid" id="photoGrid"></div>

        <button class="print-button" onclick="window.print();">Print Photos</button>
    </div>

    <script>
        const photoInput = document.getElementById("photoInput");
        const photoGrid = document.getElementById("photoGrid");

        photoInput.addEventListener("change", function(event) {
            const files = event.target.files;
            const totalPhotos = Math.min(files.length, 45); // Limit to 45 photos per page
            const photoItems = [];

            for (let i = 0; i < totalPhotos; i++) {
                const file = files[i];
                const reader = new FileReader();

                reader.onload = function(e) {
                    const imgSrc = e.target.result;
                    const photoItem = document.createElement("div");
                    photoItem.classList.add("photo-item");

                    const img = document.createElement("img");
                    img.src = imgSrc;
                    photoItem.appendChild(img);

                    photoItems.push(photoItem);
                    if (photoItems.length === totalPhotos) {
                        photoGrid.innerHTML = ''; // Clear previous photos
                        photoItems.forEach(item => photoGrid.appendChild(item)); // Add new photos
                    }
                };

                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
