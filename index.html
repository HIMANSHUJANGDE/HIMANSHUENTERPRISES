<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passport Photo Printing System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f4f4f4;
    }

    .container {
      width: 90%;
      max-width: 900px;
      text-align: center;
    }

    input[type="file"] {
      margin: 10px 0;
    }

    .photo-upload {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .photo-upload img {
      width: 45mm;
      height: 60mm;
      border: 2px solid black;
      object-fit: cover;
    }

    .bordered-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 5mm;
      width: 210mm;
      height: 297mm;
      padding: 10mm;
      margin-top: 20px;
      background-color: white;
    }

    .photo-container {
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid #000;
      height: 60mm;
      width: 45mm;
      margin: 0;
    }

    .photo-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .form-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .form-container input[type="number"] {
      margin: 10px 0;
      width: 60px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Passport Photo Printing System</h1>

  <div class="form-container">
    <label for="upload">Upload Passport Photos:</label>
    <input type="file" id="upload" accept="image/*" multiple>
    <br>
    <label for="pcs">Enter number of photos to upload:</label>
    <input type="number" id="pcs" value="1" min="1" max="45">
    <button onclick="generateLayout()">Generate Layout</button>
  </div>

  <div class="photo-upload" id="photo-upload-container"></div>

  <div id="passport-layout" class="bordered-container"></div>
</div>

<script>
  function generateLayout() {
    const pcs = document.getElementById('pcs').value;
    const uploadInput = document.getElementById('upload');
    const files = uploadInput.files;
    const photoContainer = document.getElementById('passport-layout');
    photoContainer.innerHTML = '';

    if (files.length < pcs) {
      alert('Please upload at least ' + pcs + ' photos.');
      return;
    }

    const selectedFiles = Array.from(files).slice(0, pcs);

    // Create grid with the photos
    selectedFiles.forEach(file => {
      const reader = new FileReader();
      reader.onload = function(event) {
        const photoURL = event.target.result;

        for (let i = 0; i < pcs; i++) {
          const photoDiv = document.createElement('div');
          photoDiv.classList.add('photo-container');
          
          const img = document.createElement('img');
          img.src = photoURL;
          photoDiv.appendChild(img);

          // Add to the layout grid
          photoContainer.appendChild(photoDiv);
        }
      };
      reader.readAsDataURL(file);
    });
  }

  // Optional: Display selected images in a preview section
  document.getElementById('upload').addEventListener('change', function(event) {
    const previewContainer = document.getElementById('photo-upload-container');
    previewContainer.innerHTML = ''; // Clear previous preview

    Array.from(event.target.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = function(e) {
        const imgElement = document.createElement('img');
        imgElement.src = e.target.result;
        previewContainer.appendChild(imgElement);
      };
      reader.readAsDataURL(file);
    });
  });
</script>

</body>
</html>
