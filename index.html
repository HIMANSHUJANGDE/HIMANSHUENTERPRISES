<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Login Section -->
    <div id="login-container">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="login-btn">Login</button>
        <p id="login-error" class="error-message"></p>
    </div>

    <!-- File Management Section -->
    <div id="file-dashboard-container" class="hidden">
        <h2>File Management</h2>
        <div>
            <input type="file" id="file-input">
            <button id="upload-btn">Upload File</button>
        </div>
        <ul id="file-list"></ul>
        <button id="logout-btn">Logout</button>
    </div>

    <script>



// Hardcoded users for simulation
const users = [
    { username: "user1", password: "password1" },
    { username: "user2", password: "password2" },
];

// DOM elements
const loginContainer = document.getElementById("login-container");
const fileDashboardContainer = document.getElementById("file-dashboard-container");
const loginBtn = document.getElementById("login-btn");
const uploadBtn = document.getElementById("upload-btn");
const fileList = document.getElementById("file-list");
const logoutBtn = document.getElementById("logout-btn");
const loginError = document.getElementById("login-error");
const fileInput = document.getElementById("file-input");

// Login functionality
loginBtn.addEventListener("click", function() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const user = users.find(u => u.username === username && u.password === password);

    if (user) {
        // Store the logged-in user's username in localStorage
        localStorage.setItem("currentUser", username);

        loginContainer.classList.add("hidden");
        fileDashboardContainer.classList.remove("hidden");

        loadFileList();
    } else {
        loginError.textContent = "Invalid credentials. Please try again.";
    }
});

// Logout functionality
logoutBtn.addEventListener("click", function() {
    // Remove the logged-in user from localStorage
    localStorage.removeItem("currentUser");

    loginContainer.classList.remove("hidden");
    fileDashboardContainer.classList.add("hidden");
});

// Upload a file
uploadBtn.addEventListener("click", function() {
    const file = fileInput.files[0];
    if (file) {
        const reader = new FileReader();

        reader.onload = function(event) {
            const fileData = {
                name: file.name,
                content: event.target.result,
            };

            const currentUser = localStorage.getItem("currentUser");
            let userFiles = JSON.parse(localStorage.getItem(currentUser)) || [];
            userFiles.push(fileData);
            localStorage.setItem(currentUser, JSON.stringify(userFiles));

            loadFileList();
        };

        reader.readAsText(file);
    } else {
        alert("Please select a file to upload.");
    }
});

// Load the list of files for the logged-in user
function loadFileList() {
    const currentUser = localStorage.getItem("currentUser");
    const userFiles = JSON.parse(localStorage.getItem(currentUser)) || [];
    fileList.innerHTML = "";

    userFiles.forEach((file, index) => {
        const li = document.createElement("li");
        li.innerHTML = `${file.name} <button onclick="downloadFile(${index})">Download</button> <button onclick="deleteFile(${index})">Delete</button>`;
        fileList.appendChild(li);
    });
}

// Download a file
function downloadFile(index) {
    const currentUser = localStorage.getItem("currentUser");
    const userFiles = JSON.parse(localStorage.getItem(currentUser)) || [];
    const file = userFiles[index];

    const blob = new Blob([file.content], { type: 'text/plain' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = file.name;
    link.click();
}

// Delete a file
function deleteFile(index) {
    const currentUser = localStorage.getItem("currentUser");
    let userFiles = JSON.parse(localStorage.getItem(currentUser)) || [];
    userFiles.splice(index, 1);
    localStorage.setItem(currentUser, JSON.stringify(userFiles));

    loadFileList();
}

// Check if user is already logged in
document.addEventListener("DOMContentLoaded", function() {
    const currentUser = localStorage.getItem("currentUser");
    if (currentUser) {
        loginContainer.classList.add("hidden");
        fileDashboardContainer.classList.remove("hidden");
        loadFileList();
    }
});
        

        
    </script>
</body>
</html>
