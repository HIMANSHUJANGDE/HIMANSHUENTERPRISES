<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Photo Print Layout</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
    }

    #controls {
      margin-bottom: 20px;
    }

    input[type="number"] {
      width: 60px;
    }

    #photoArea {
      width: 210mm;
      height: 297mm;
      border: 1px solid #ccc;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 0;
      background: white;
    }

    .photo {
      width: calc(210mm / 9); /* 9 columns */
      height: calc(297mm / 5); /* 5 rows */
      box-sizing: border-box;
      border: 1px solid #000;
      object-fit: cover;
    }

    @media print {
      body {
        margin: 0;
        padding: 0;
      }
      #controls {
        display: none;
      }
      #photoArea {
        width: 210mm;
        height: 297mm;
        border: none;
        page-break-after: always;
      }
    }
  </style>
</head>
<body>
  <div id="controls">
    <input type="file" id="fileInput" multiple accept="image/*">
    <label>Copies per image:</label>
    <input type="number" id="copies" min="1" value="1">
    <button onclick="generateLayout()">Generate Layout</button>
    <button onclick="window.print()">Print</button>
  </div>

  <div id="photoArea"></div>

  <script>
    let images = [];

    document.getElementById('fileInput').addEventListener('change', (event) => {
      images = Array.from(event.target.files);
    });

    function generateLayout() {
      const container = document.getElementById('photoArea');
      container.innerHTML = ''; // Clear previous layout
      const copies = parseInt(document.getElementById('copies').value);

      let photoCount = 0;
      const maxPhotos = 45; // A4: 9 x 5 = 45

      for (const file of images) {
        if (photoCount >= maxPhotos) break;
        const reader = new FileReader();

        reader.onload = function(e) {
          for (let i = 0; i < copies && photoCount < maxPhotos; i++) {
            const img = document.createElement('img');
            img.src = e.target.result;
            img.className = 'photo';
            container.appendChild(img);
            photoCount++;
          }
        };

        reader.readAsDataURL(file);
      }
    }
  </script>
</body>
</html>
