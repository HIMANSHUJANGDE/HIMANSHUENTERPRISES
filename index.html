<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All-in-One Photo Editor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      text-align: center;
      padding: 20px;
    }
    canvas {
      border: 1px solid #ccc;
      margin-top: 15px;
      max-width: 100%;
    }
    .controls, .actions {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .actions button {
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
    }
    input[type="file"], input[type="color"] {
      margin: 5px 0;
    }
  </style>
</head>
<body>

  <h2>🖼️ All-in-One Photo Editor</h2>
  <input type="file" id="uploadImage" accept="image/*"><br>
  <canvas id="canvas"></canvas>

  <div class="controls">
    <div class="control-group">
      <label>Brightness</label>
      <input type="range" id="brightness" min="0" max="2" step="0.1" value="1">
    </div>
    <div class="control-group">
      <label>Contrast</label>
      <input type="range" id="contrast" min="0" max="2" step="0.1" value="1">
    </div>
    <div class="control-group">
      <label>Saturation</label>
      <input type="range" id="saturation" min="0" max="2" step="0.1" value="1">
    </div>
  </div>

  <div class="actions">
    <button onclick="removeBackground()">Remove White BG</button>
    <input type="color" id="bgColorPicker" value="#ffffff">
    <button onclick="setBackgroundColor()">Set Background Color</button>
    <input type="file" id="bgImage" accept="image/*">
    <button onclick="setBackgroundImage()">Set Background Image</button>
    <button onclick="downloadEdited()">Download PNG</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let originalImage = new Image();

    document.getElementById('uploadImage').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        originalImage = new Image();
        originalImage.onload = () => {
          canvas.width = originalImage.width;
          canvas.height = originalImage.height;
          drawImage();
        };
        originalImage.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    function drawImage() {
      const brightness = document.getElementById('brightness').value;
      const contrast = document.getElementById('contrast').value;
      const saturation = document.getElementById('saturation').value;
      ctx.filter = `brightness(${brightness}) contrast(${contrast}) saturate(${saturation})`;
      ctx.drawImage(originalImage, 0, 0);
    }

    document.querySelectorAll('input[type="range"]').forEach(input => {
      input.addEventListener('input', drawImage);
    });

    function removeBackground() {
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i + 1], b = data[i + 2];
        if (r > 220 && g > 220 && b > 220) {
          data[i + 3] = 0; // Make pixel transparent
        }
      }
      ctx.putImageData(imageData, 0, 0);
    }

    function setBackgroundColor() {
      const color = document.getElementById('bgColorPicker').value;
      const tempCanvas = document.createElement('canvas');
      const tempCtx = tempCanvas.getContext('2d');
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;

      tempCtx.fillStyle = color;
      tempCtx.fillRect(0, 0, canvas.width, canvas.height);
      tempCtx.drawImage(canvas, 0, 0);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(tempCanvas, 0, 0);
    }

    function setBackgroundImage() {
      const file = document.getElementById('bgImage').files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (e) {
        const bgImage = new Image();
        bgImage.onload = () => {
          const tempCanvas = document.createElement('canvas');
          const tempCtx = tempCanvas.getContext('2d');
          tempCanvas.width = canvas.width;
          tempCanvas.height = canvas.height;

          tempCtx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
          tempCtx.drawImage(canvas, 0, 0);

          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(tempCanvas, 0, 0);
        };
        bgImage.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function downloadEdited() {
      const link = document.createElement('a');
      link.download = 'edited-image.png';
      link.href = canvas.toDataURL();
      link.click();
    }
  </script>

</body>
</html>
