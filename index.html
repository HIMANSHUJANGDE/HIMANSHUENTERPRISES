<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>All‑in‑One Photo Editor</title>
<style>
  body { font-family: Arial; text-align: center; margin: 20px; }
  canvas { border: 1px solid #ccc; margin-top: 10px; max-width: 100%; }
  .controls, .btns { margin-top: 15px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
  label { font-size: 0.9em; }
</style>
</head>
<body>
  <h2>🖼️ Photo Editor + Background Toolkit</h2>
  <input type="file" id="upload" accept="image/*"><br>
  <canvas id="canvas"></canvas>

  <div class="controls">
    <div>
      <label>Brightness</label><input type="range" id="brightness" min="0" max="2" step="0.01" value="1">
    </div>
    <div>
      <label>Contrast</label><input type="range" id="contrast" min="0" max="2" step="0.01" value="1">
    </div>
    <div>
      <label>Saturation</label><input type="range" id="saturation" min="0" max="2" step="0.01" value="1">
    </div>
  </div>

  <div class="btns">
    <button onclick="removeBackground()">Remove White Background</button>
    <input type="color" id="bgColor" value="#ffffff">
    <button onclick="changeBackgroundColor()">Set Background Color</button>
    <input type="file" id="bgImage" accept="image/*">
    <button onclick="changeBackgroundImage()">Set Background Image</button>
    <button onclick="downloadImage()">Download PNG</button>
  </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let img = new Image();

document.getElementById('upload').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => {
    img.onload = () => {
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(f);
});

function applyFilters() {
  ctx.filter = `
    brightness(${+document.getElementById('brightness').value})
    contrast(${+document.getElementById('contrast').value})
    saturate(${+document.getElementById('saturation').value})
  `;
  ctx.drawImage(img, 0, 0);
}

['brightness','contrast','saturation'].forEach(id => {
  document.getElementById(id).addEventListener('input', applyFilters);
});

function removeBackground() {
  const d = ctx.getImageData(0,0,canvas.width,canvas.height);
  for (let i = 0; i < d.data.length; i += 4) {
    if (d.data[i] > 240 && d.data[i+1] > 240 && d.data[i+2] > 240) {
      d.data[i+3] = 0;
    }
  }
  ctx.putImageData(d, 0, 0);
}

function changeBackgroundColor() {
  const color = document.getElementById('bgColor').value;
  const tmp = document.createElement('canvas');
  const tc = tmp.getContext('2d');
  tmp.width = canvas.width;
  tmp.height = canvas.height;
  tc.fillStyle = color;
  tc.fillRect(0, 0, tmp.width, tmp.height);
  tc.drawImage(canvas, 0, 0);
  canvas.width = tmp.width;
  canvas.height = tmp.height;
  ctx.drawImage(tmp, 0, 0);
}

function changeBackgroundImage() {
  const f = document.getElementById('bgImage').files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    const bg = new Image();
    bg.onload = () => {
      const tmp = document.createElement('canvas');
      const tc = tmp.getContext('2d');
      tmp.width = canvas.width;
      tmp.height = canvas.height;
      tc.drawImage(bg, 0, 0, tmp.width, tmp.height);
      tc.drawImage(canvas, 0, 0);
      canvas.width = tmp.width;
      canvas.height = tmp.height;
      ctx.drawImage(tmp, 0, 0);
    };
    bg.src = ev.target.result;
  };
  r.readAsDataURL(f);
}

function downloadImage() {
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'edited.png';
  a.click();
}
</script>
</body>
</html>
