<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>45 Photo Print Layout</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
      text-align: center;
    }

    input[type="file"] {
      margin-bottom: 10px;
    }

    .print-page {
      width: 210mm;
      height: 297mm;
      margin: auto;
      background: white;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(9, 1fr);
      gap: 2mm;
      padding: 5mm;
      box-sizing: border-box;
      border: 1px solid #ccc;
    }

    .photo-slot {
      width: 100%;
      height: 100%;
      border: 1px solid #333;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .photo-slot img {
      max-width: 100%;
      max-height: 100%;
      object-fit: cover;
      transform-origin: center center;
    }

    @media print {
      body {
        margin: 0;
      }
      .no-print {
        display: none;
      }
      .print-page {
        border: none;
      }
    }
  </style>
</head>
<body>

  <h2 class="no-print">Upload up to 45 Photos</h2>
  <input class="no-print" type="file" id="photoUpload" multiple accept="image/*">
  <div class="print-page" id="photoGrid"></div>

  <script>
    const photoUpload = document.getElementById('photoUpload');
    const photoGrid = document.getElementById('photoGrid');

    photoUpload.addEventListener('change', function () {
      const files = Array.from(this.files).slice(0, 45); // max 45
      photoGrid.innerHTML = ''; // clear previous

      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = function (e) {
          const img = new Image();
          img.onload = () => {
            const wrapper = document.createElement('div');
            wrapper.className = 'photo-slot';

            // Rotate landscape images
            if (img.width > img.height) {
              img.style.transform = 'rotate(90deg)';
            }

            wrapper.appendChild(img);
            photoGrid.appendChild(wrapper);
            fillRemaining(); // ensure 45 slots
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });

      function fillRemaining() {
        const count = photoGrid.children.length;
        for (let i = count; i < 45; i++) {
          const empty = document.createElement('div');
          empty.className = 'photo-slot';
          photoGrid.appendChild(empty);
        }
      }
    });
  </script>

</body>
</html>
