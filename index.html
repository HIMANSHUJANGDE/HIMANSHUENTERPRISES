<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini Photo Print Layout</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      padding: 20px;
      background: #f0f0f0;
    }

    .controls {
      margin-bottom: 20px;
    }

    .photo-grid {
      width: 210mm;
      height: 297mm;
      display: flex;
      flex-wrap: wrap;
      background: white;
      position: relative;
      page-break-after: always;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .photo {
      width: calc(100% / 9);   /* 9 columns */
      height: calc((297mm - 10mm) / 5);  /* 5 rows, minus top padding */
      border: 1px solid #000;
      padding: 1mm;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: rotate(90deg); /* Landscape */
    }

    @media print {
      body {
        background: none;
        padding: 0;
      }
      .controls {
        display: none;
      }
      .photo-grid {
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div class="controls">
    <input type="file" id="photoUpload" accept="image/*" multiple />
    <label>
      Copies per photo:
      <input type="number" id="copies" value="1" min="1" max="45" style="width: 60px;" />
    </label>
    <button onclick="generateLayout()">Generate Layout</button>
    <button onclick="window.print()">Print</button>
  </div>

  <div id="pagesContainer"></div>

  <script>
    function generateLayout() {
      const files = document.getElementById('photoUpload').files;
      const copies = parseInt(document.getElementById('copies').value);
      const container = document.getElementById('pagesContainer');
      container.innerHTML = '';

      if (!files.length) {
        alert("Please upload at least one photo.");
        return;
      }

      const images = [];

      for (const file of files) {
        for (let i = 0; i < copies; i++) {
          images.push(URL.createObjectURL(file));
        }
      }

      const photosPerPage = 45;
      let page, photoDiv;

      for (let i = 0; i < images.length; i++) {
        if (i % photosPerPage === 0) {
          page = document.createElement('div');
          page.className = 'photo-grid';
          container.appendChild(page);
        }

        photoDiv = document.createElement('div');
        photoDiv.className = 'photo';

        const img = document.createElement('img');
        img.src = images[i];

        photoDiv.appendChild(img);
        page.appendChild(photoDiv);
      }
    }
  </script>
</body>
</html>
