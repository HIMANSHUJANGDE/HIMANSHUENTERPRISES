<!DOCTYPE html>
<html>
<head>
  <title>Website to APK Maker</title>
  <style>
    body { font-family: sans-serif; text-align: center; margin-top: 50px; }
    input[type="file"] { margin: 20px; }
  </style>
</head>
<body>
  <h1>Website to APK Maker</h1>
  <input type="file" id="zipUpload" accept=".zip" />
  <button onclick="buildApk()">Build APK</button>
  <p id="status"></p>

  <script>
    const { ipcRenderer } = require("electron");

    function buildApk() {
      const file = document.getElementById('zipUpload').files[0];
      if (!file) {
        alert("Please upload a ZIP file of your website.");
        return;
      }

      const reader = new FileReader();
      reader.onload = function () {
        ipcRenderer.send("build-apk", reader.result);
        document.getElementById('status').textContent = "Building APK...";
      };
      reader.readAsArrayBuffer(file);
    }

    ipcRenderer.on("build-complete", (event, apkPath) => {
      document.getElementById('status').textContent = "APK ready: " + apkPath;
    });
  </script>
</body>
</html>
