<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Photo Print Sheet (45 per A4)</title>
  <style>
    :root {
      --photo-width-mm: 24mm;
      --photo-height-mm: 32mm;
      --columns: 5;
      --rows: 9;
      --gap-mm: 3mm;
    }

    body {
      margin: 0;
      padding: 10mm;
      background: #ccc;
      font-family: sans-serif;
    }

    .controls {
      margin-bottom: 10px;
    }

    .controls input,
    .controls button {
      padding: 6px 10px;
      font-size: 14px;
    }

    .print-area {
      background: #fff;
      width: 210mm;
      height: 297mm;
      box-sizing: border-box;
      display: grid;
      grid-template-columns: repeat(var(--columns), var(--photo-width-mm));
      grid-template-rows: repeat(var(--rows), var(--photo-height-mm));
      gap: var(--gap-mm);
      padding: 5mm;
      overflow: hidden;
    }

    .photo-box {
      width: var(--photo-width-mm);
      height: var(--photo-height-mm);
      border: 1px solid #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
    }

    .photo-box img {
      max-width: 100%;
      max-height: 100%;
    }

    @media print {
      body {
        padding: 0;
        background: #fff;
      }
      .controls {
        display: none;
      }
      .print-area {
        margin: 0;
        box-shadow: none;
        page-break-after: always;
      }
    }
  </style>
</head>
<body>

  <div class="controls">
    <input type="file" id="photoUpload" multiple accept="image/*">
    <button onclick="window.print()">Print</button>
  </div>

  <div class="print-area" id="printArea"></div>

  <script>
    const photoInput = document.getElementById('photoUpload');
    const printArea = document.getElementById('printArea');

    photoInput.addEventListener('change', () => {
      const files = Array.from(photoInput.files).slice(0, 45); // Limit to 45
      printArea.innerHTML = ''; // Clear previous content

      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const box = document.createElement('div');
          box.className = 'photo-box';

          const img = document.createElement('img');
          img.src = e.target.result;

          box.appendChild(img);
          printArea.appendChild(box);
        };
        reader.readAsDataURL(file);
      });
    });
  </script>

</body>
</html>
