<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Photo Print - 45 PCS (A4 Landscape)</title>
  <style>
    :root {
      --photo-width: 24mm;
      --photo-height: 32mm;
      --columns: 9;
      --rows: 5;
      --gap: 2mm;
    }

    body {
      margin: 0;
      padding: 10mm;
      background: #f0f0f0;
      font-family: Arial, sans-serif;
    }

    .controls {
      margin-bottom: 10px;
    }

    .controls input,
    .controls button {
      font-size: 14px;
      padding: 6px 12px;
      margin-right: 6px;
    }

    .print-area {
      background: white;
      width: 297mm;
      height: 210mm;
      box-sizing: border-box;
      display: grid;
      grid-template-columns: repeat(var(--columns), var(--photo-width));
      grid-template-rows: repeat(var(--rows), var(--photo-height));
      gap: var(--gap);
      padding: 5mm;
      margin: auto;
      box-shadow: 0 0 4px rgba(0,0,0,0.2);
    }

    .photo-box {
      border: 1px solid black;
      width: var(--photo-width);
      height: var(--photo-height);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #fff;
    }

    .photo-box img {
      max-width: 100%;
      max-height: 100%;
      object-fit: cover;
    }

    @media print {
      body {
        padding: 0;
        background: white;
      }

      .controls {
        display: none;
      }

      .print-area {
        box-shadow: none;
        margin: 0;
        page-break-after: always;
      }
    }
  </style>
</head>
<body>

  <div class="controls">
    <input type="file" id="fileInput" multiple accept="image/*">
    <button onclick="window.print()">Print</button>
  </div>

  <div class="print-area" id="printArea"></div>

  <script>
    const input = document.getElementById('fileInput');
    const printArea = document.getElementById('printArea');

    input.addEventListener('change', () => {
      const files = Array.from(input.files).slice(0, 45); // Limit to 45
      printArea.innerHTML = ''; // Clear previous photos

      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
          const photoBox = document.createElement('div');
          photoBox.className = 'photo-box';

          const img = document.createElement('img');
          img.src = e.target.result;

          photoBox.appendChild(img);
          printArea.appendChild(photoBox);
        };
        reader.readAsDataURL(file);
      });
    });
  </script>

</body>
</html>
