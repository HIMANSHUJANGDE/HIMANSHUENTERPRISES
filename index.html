<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Printing Layout</title>
    <style>


body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

.container {
    width: 80%;
    margin: 0 auto;
}

.layout-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-start;
    margin-top: 20px;
}

.layout-container img {
    width: 30%;
    margin: 0;
    padding: 5px;
    box-sizing: border-box;
    object-fit: cover;
    height: 120px; /* Adjust size for your needs */
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    background-color: #4CAF50;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background-color: #45a049;
}


      
    </style>
</head>
<body>
    <div class="container">
        <h1>Upload Photos and Print</h1>
        <div>
            <input type="file" id="photoUpload" accept="image/*" multiple>
        </div>
        <div>
            <label for="numCopies">Number of Copies per Photo: </label>
            <input type="number" id="numCopies" value="5" min="1">
        </div>
        <button id="generateLayout">Generate Layout</button>
        <div id="layoutContainer" class="layout-container"></div>
        <button id="printButton">Print Layout</button>
    </div>

    <script>


document.getElementById('generateLayout').addEventListener('click', function() {
    const fileInput = document.getElementById('photoUpload');
    const layoutContainer = document.getElementById('layoutContainer');
    const numCopies = document.getElementById('numCopies').value;

    // Clear previous layout
    layoutContainer.innerHTML = '';

    // Get files from input
    const files = fileInput.files;

    if (files.length === 0) {
        alert('Please upload some photos first!');
        return;
    }

    // Create layout based on uploaded photos
    let photoCount = 0;
    for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const reader = new FileReader();

        reader.onload = function(e) {
            for (let j = 0; j < numCopies; j++) {
                const img = document.createElement('img');
                img.src = e.target.result;
                layoutContainer.appendChild(img);
                photoCount++;
            }

            // Check if all images have been processed
            if (photoCount === files.length * numCopies) {
                console.log('Layout generated.');
            }
        };

        reader.readAsDataURL(file);
    }
});

document.getElementById('printButton').addEventListener('click', function() {
    const layoutContainer = document.getElementById('layoutContainer');

    const printWindow = window.open('', '', 'height=600, width=800');
    printWindow.document.write('<html><head><title>Print Layout</title></head><body>');
    printWindow.document.write('<style>body { margin: 0; padding: 0; } .layout-container { display: flex; flex-wrap: wrap; justify-content: flex-start; } .layout-container img { width: 30%; height: 120px; margin: 0; padding: 5px; }</style>');
    printWindow.document.write(layoutContainer.innerHTML);
    printWindow.document.write('</body></html>');
    printWindow.document.close();
    printWindow.print();
});


      
    </script>
</body>
</html>
