<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Printing System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    .container {
      width: 210mm;
      height: 297mm;
      margin: 0 auto;
      padding: 10mm;
      display: grid;
      grid-template-columns: repeat(5, 1fr); /* 5 photos per row */
      grid-template-rows: repeat(9, 1fr); /* 9 rows for total of 45 photos */
      gap: 5mm;
      box-sizing: border-box;
    }

    .photo {
      width: 30mm;
      height: 40mm;
      object-fit: cover;
      border: 1px solid #ccc;
      position: relative;
      overflow: hidden;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    input[type="file"] {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<h2>Upload Photos for Printing</h2>

<input type="file" id="fileInput" multiple accept="image/*" />
<div class="container" id="photoContainer"></div>

<script>
  const fileInput = document.getElementById('fileInput');
  const photoContainer = document.getElementById('photoContainer');

  fileInput.addEventListener('change', handleFileUpload);

  function handleFileUpload(event) {
    const files = event.target.files;
    photoContainer.innerHTML = ''; // Clear existing photos

    if (files.length > 45) {
      alert("You can only upload up to 45 photos.");
      return;
    }

    // Loop through each file
    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      const photoDiv = document.createElement('div');
      photoDiv.classList.add('photo');

      const img = document.createElement('img');
      const reader = new FileReader();
      
      reader.onload = function(e) {
        img.src = e.target.result;
        img.onload = function() {
          // Auto rotate if needed (landscape to portrait)
          const imgWidth = img.width;
          const imgHeight = img.height;
          
          // If the image is in landscape mode, rotate it to portrait mode
          if (imgWidth > imgHeight) {
            img.style.transform = 'rotate(90deg)';
          }
        };
      };
      reader.readAsDataURL(file);

      photoDiv.appendChild(img);
      photoContainer.appendChild(photoDiv);
    }

    // Fill the rest with empty divs to ensure 45 photos
    const totalPhotos = photoContainer.children.length;
    for (let i = totalPhotos; i < 45; i++) {
      const emptyDiv = document.createElement('div');
      emptyDiv.classList.add('photo');
      photoContainer.appendChild(emptyDiv);
    }
  }
</script>

</body>
</html>
