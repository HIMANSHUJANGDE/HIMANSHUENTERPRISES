<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Photo Editor</title>
  <style>
    body { font-family: Arial; background: #f4f4f4; padding: 20px; text-align: center; }
    canvas { border: 1px solid #999; display: block; margin: 10px auto; max-width: 100%; }
    input, button { margin: 5px; padding: 8px; }
  </style>
</head>
<body>
  <h1>🖼 AI Photo Editor</h1>
  <input type="file" id="imgUpload" accept="image/*"><br>
  <button id="removeBtn" disabled>🪄 Remove BG (AI)</button><br>
  <input type="color" id="bgColor" value="#ffffff" disabled>
  <input type="file" id="bgImage" accept="image/*" disabled><br>
  <button id="downloadBtn" disabled>Download Result</button>
  <canvas id="canvas"></canvas>

  <script type="module">
    import imglyRemoveBackground from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal/dist/browser.esm.js';

    const upload = document.getElementById('imgUpload'),
          removeBtn = document.getElementById('removeBtn'),
          bgColor = document.getElementById('bgColor'),
          bgImage = document.getElementById('bgImage'),
          downloadBtn = document.getElementById('downloadBtn'),
          canvas = document.getElementById('canvas'),
          ctx = canvas.getContext('2d');
    let origImg = new Image(), maskBlob = null;

    upload.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      origImg = new Image();
      origImg.onload = () => {
        canvas.width = origImg.width;
        canvas.height = origImg.height;
        ctx.drawImage(origImg, 0, 0);
        removeBtn.disabled = false;
      };
      origImg.src = url;
    };

    removeBtn.onclick = async () => {
      removeBtn.textContent = 'Processing…';
      maskBlob = await imglyRemoveBackground(origImg.src);
      const maskImg = new Image();
      maskImg.onload = () => {
        canvas.width = maskImg.width;
        canvas.height = maskImg.height;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(maskImg, 0, 0);
        ctx.globalCompositeOperation = 'source-in';
        ctx.drawImage(origImg, 0, 0);
        ctx.globalCompositeOperation = 'source-over';
        bgColor.disabled = bgImage.disabled = downloadBtn.disabled = false;
        removeBtn.textContent = '✅ Remove BG (AI)';
      };
      maskImg.src = URL.createObjectURL(maskBlob);
    };

    bgColor.oninput = () => {
      const color = bgColor.value;
      ctx.globalCompositeOperation = 'destination-over';
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.globalCompositeOperation = 'source-over';
    };

    bgImage.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      const bg = new Image();
      bg.onload = () => {
        ctx.globalCompositeOperation = 'destination-over';
        ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = 'source-over';
      };
      bg.src = url;
    };

    downloadBtn.onclick = () => {
      const link = document.createElement('a');
      link.download = 'edited.png';
      link.href = canvas.toDataURL();
      link.click();
    };
  </script>
</body>
</html>
