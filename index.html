<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Downloader</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      text-align: center;
      padding: 50px;
    }
    input {
      padding: 10px;
      width: 300px;
    }
    button {
      padding: 10px 20px;
      margin-left: 10px;
    }
  </style>
</head>
<body>
  <h1>YouTube Video Downloader</h1>
  <input type="text" id="url" placeholder="Enter YouTube Video URL">
  <button onclick="downloadVideo()">Download</button>

  <p id="message"></p>

  <script>
    function downloadVideo() {
      const url = document.getElementById('url').value;
      if (!url.includes('youtube.com') && !url.includes('youtu.be')) {
        document.getElementById('message').innerText = "Invalid YouTube URL.";
        return;
      }
      document.getElementById('message').innerText = "This needs a server to download.";
    }
  </script>
</body>
</html>
