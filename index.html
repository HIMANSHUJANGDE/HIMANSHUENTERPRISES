<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HTML to APK Tool</title>
  <style>




    body {
  font-family: Arial, sans-serif;
  padding: 30px;
  background: #f0f0f0;
}
form {
  background: #fff;
  padding: 20px;
  max-width: 400px;
  margin: auto;
  border-radius: 8px;
}
label {
  display: block;
  margin: 10px 0 5px;
}
input, button {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
}
button {
  background-color: #28a745;
  color: white;
  border: none;
}
#result {
  text-align: center;
  margin-top: 20px;
}

  </style>
</head>
<body>
  <h1>HTML to APK Converter</h1>
  <form id="apkForm">
    <label>App Name:</label>
    <input type="text" id="appName" required>

    <label>Package Name:</label>
    <input type="text" id="packageName" placeholder="com.example.app" required>

    <label>Version:</label>
    <input type="text" id="version" value="1.0.0">

    <label>Upload HTML Project (.zip):</label>
    <input type="file" id="htmlZip" accept=".zip" required>

    <button type="submit">Generate APK</button>
  </form>
  <div id="result"></div>

  <script>


document.getElementById("apkForm").addEventListener("submit", function (e) {
  e.preventDefault();

  const formData = new FormData();
  formData.append("appName", document.getElementById("appName").value);
  formData.append("packageName", document.getElementById("packageName").value);
  formData.append("version", document.getElementById("version").value);
  formData.append("htmlZip", document.getElementById("htmlZip").files[0]);

  fetch("https://your-backend-or-api.com/build-apk", {
    method: "POST",
    body: formData
  })
    .then(res => res.json())
    .then(data => {
      if (data.success && data.apkUrl) {
        document.getElementById("result").innerHTML = `
          <p>APK generated!</p>
          <a href="${data.apkUrl}" target="_blank">Download APK</a>
        `;
      } else {
        document.getElementById("result").textContent = "Failed to generate APK.";
      }
    })
    .catch(() => {
      document.getElementById("result").textContent = "An error occurred.";
    });
});


    
  </script>
</body>
</html>
