<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Website to APK Maker</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <h1>Website to APK Maker</h1>
    <p>Select a ZIP file of your website (must contain index.html)</p>
    <input type="file" id="fileInput" accept=".zip" />
    <button id="uploadBtn">Build APK</button>
    <p id="status"></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
