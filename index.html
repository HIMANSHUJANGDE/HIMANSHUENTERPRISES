<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Print Mini Landscape Photos on A4 Portrait</title>
  <style>
    :root {
      --photo-width: 32mm;   /* Landscape width */
      --photo-height: 24mm;  /* Landscape height */
      --columns: 5;
      --rows: 9;
      --gap: 2mm;
    }

    body {
      margin: 0;
      padding: 10mm;
      background: #f4f4f4;
      font-family: sans-serif;
    }

    .controls {
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .controls input,
    .controls button {
      font-size: 14px;
      padding: 6px 12px;
    }

    .print-area {
      width: 210mm;
      height: 297mm;
      background: white;
      display: grid;
      grid-template-columns: repeat(var(--columns), var(--photo-width));
      grid-template-rows: repeat(var(--rows), var(--photo-height));
      gap: var(--gap);
      padding: 5mm;
      margin: auto;
      box-sizing: border-box;
      box-shadow: 0 0 6px rgba(0, 0, 0, 0.15);
    }

    .photo-box {
      border: 1px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      overflow: hidden;
      width: var(--photo-width);
      height: var(--photo-height);
    }

    .photo-box img {
      max-width: 100%;
      max-height: 100%;
      object-fit: cover;
    }

    @media print {
      body {
        background: white;
        padding: 0;
      }

      .controls {
        display: none;
      }

      .print-area {
        box-shadow: none;
        margin: 0;
        page-break-after: always;
      }
    }
  </style>
</head>
<body>

  <div class="controls">
    <label>Upload photos (landscape):</label>
    <input type="file" id="photoInput" multiple accept="image/*" />
    
    <label>Set number of photos (max 45):</label>
    <input type="number" id="pcsInput" min="1" max="45" value="45" />
    
    <button onclick="window.print()">Print</button>
  </div>

  <div class="print-area" id="printArea"></div>

  <script>
    const photoInput = document.getElementById("photoInput");
    const pcsInput = document.getElementById("pcsInput");
    const printArea = document.getElementById("printArea");

    photoInput.addEventListener("change", () => {
      const total = Math.min(Number(pcsInput.value), 45);
      const files = Array.from(photoInput.files);
      
      if (files.length === 0) {
        alert("Please select at least one image.");
        return;
      }

      printArea.innerHTML = '';

      let index = 0;
      for (let i = 0; i < total; i++) {
        const file = files[index];
        const reader = new FileReader();

        reader.onload = (e) => {
          const box = document.createElement("div");
          box.className = "photo-box";

          const img = document.createElement("img");
          img.src = e.target.result;

          box.appendChild(img);
          printArea.appendChild(box);
        };

        reader.readAsDataURL(file);
        
        // Cycle through photos if fewer than requested
        index = (index + 1) % files.length;
      }
    });
  </script>

</body>
</html>
