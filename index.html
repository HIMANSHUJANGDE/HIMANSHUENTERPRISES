<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Small Photo Print Layout - A4 Portrait</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background: #f0f0f0;
    }
    .controls {
      padding: 10px;
      background: white;
      text-align: center;
    }
    .controls input,
    .controls button {
      margin: 5px;
      padding: 8px;
      font-size: 14px;
    }
    .page {
      width: 210mm;
      height: 297mm;
      background: white;
      margin: 10px auto;
      display: grid;
      grid-template-columns: repeat(5, 3.5cm);
      grid-auto-rows: 2.5cm;
      gap: 2mm;
      padding: 10mm;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      align-content: start; /* Start from top */
    }
    .photo {
      border: 1px solid #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: rotate(0deg); /* landscape format */
    }
    @media print {
      body { background: none; }
      .controls { display: none; }
      .page {
        margin: 0;
        box-shadow: none;
        page-break-after: always;
      }
    }
  </style>
</head>
<body>

<div class="controls">
  <input type="file" id="fileInput" multiple accept="image/*">
  <input type="number" id="pcsInput" placeholder="Enter PCS (copies per image)" min="1" value="1">
  <button onclick="generateLayout()">🖨️ Generate</button>
  <button onclick="window.print()">🖨️ Print</button>
</div>

<div id="output"></div>

<script>
  const fileInput = document.getElementById('fileInput');
  const pcsInput = document.getElementById('pcsInput');
  const output = document.getElementById('output');

  const PHOTOS_PER_PAGE = 45;

  function generateLayout() {
    const files = Array.from(fileInput.files);
    const pcs = parseInt(pcsInput.value) || 1;

    if (files.length === 0) {
      alert("Please upload at least one photo.");
      return;
    }

    const allImages = [];

    files.forEach(file => {
      for (let i = 0; i < pcs; i++) {
        allImages.push(file);
      }
    });

    output.innerHTML = '';
    const pagesNeeded = Math.ceil(allImages.length / PHOTOS_PER_PAGE);

    for (let i = 0; i < pagesNeeded; i++) {
      const pageDiv = document.createElement('div');
      pageDiv.className = 'page';

      const currentFiles = allImages.slice(i * PHOTOS_PER_PAGE, (i + 1) * PHOTOS_PER_PAGE);

      currentFiles.forEach(file => {
        const reader = new FileReader();
        reader.onload = function (e) {
          const photoDiv = document.createElement('div');
          photoDiv.className = 'photo';

          const img = document.createElement('img');
          img.src = e.target.result;

          photoDiv.appendChild(img);
          pageDiv.appendChild(photoDiv);
        };
        reader.readAsDataURL(file);
      });

      output.appendChild(pageDiv);
    }
  }
</script>

</body>
</html>
