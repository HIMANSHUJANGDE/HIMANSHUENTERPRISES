<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>45 Photo Print Layout - A4 Portrait</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background: #eee;
    }
    .controls {
      padding: 10px;
      background: #fff;
      text-align: center;
    }
    .controls input,
    .controls button {
      margin: 5px;
      padding: 8px 12px;
      font-size: 14px;
    }
    .page {
      width: 210mm;
      height: 297mm;
      background: white;
      margin: 10px auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-evenly;
      align-content: flex-start;
      padding: 10mm;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }
    .photo {
      width: 3.5cm;
      height: 2.5cm;
      margin: 2mm;
      border: 1px solid #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: rotate(0deg); /* landscape */
    }
    @media print {
      body {
        background: none;
      }
      .controls {
        display: none;
      }
      .page {
        box-shadow: none;
        margin: 0;
        page-break-after: always;
      }
    }
  </style>
</head>
<body>

<div class="controls">
  <input type="file" id="fileInput" multiple accept="image/*">
  <button onclick="window.print()">🖨️ Print</button>
</div>

<div id="output"></div>

<script>
  const fileInput = document.getElementById('fileInput');
  const output = document.getElementById('output');
  const PHOTOS_PER_PAGE = 45;

  fileInput.addEventListener('change', function () {
    const files = Array.from(fileInput.files);
    const pagesNeeded = Math.ceil(files.length / PHOTOS_PER_PAGE);

    output.innerHTML = ''; // Clear old pages

    for (let i = 0; i < pagesNeeded; i++) {
      const pageDiv = document.createElement('div');
      pageDiv.className = 'page';

      const currentFiles = files.slice(i * PHOTOS_PER_PAGE, (i + 1) * PHOTOS_PER_PAGE);
      
      currentFiles.forEach(file => {
        const reader = new FileReader();
        reader.onload = function (e) {
          const photoDiv = document.createElement('div');
          photoDiv.className = 'photo';

          const img = document.createElement('img');
          img.src = e.target.result;

          photoDiv.appendChild(img);
          pageDiv.appendChild(photoDiv);
        };
        reader.readAsDataURL(file);
      });

      output.appendChild(pageDiv);
    }
  });
</script>

</body>
</html>
