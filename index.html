<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>45 Mini Landscape Photos on A4 Portrait</title>
  <style>
    :root {
      --photo-width: 32mm;   /* Landscape: width > height */
      --photo-height: 24mm;
      --columns: 5;
      --rows: 9;
      --gap: 2mm;
    }

    body {
      margin: 0;
      padding: 10mm;
      background: #f5f5f5;
      font-family: sans-serif;
    }

    .controls {
      margin-bottom: 10px;
    }

    .controls input,
    .controls button {
      padding: 6px 12px;
      font-size: 14px;
      margin-right: 6px;
    }

    .print-area {
      background: white;
      width: 210mm;
      height: 297mm;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(var(--columns), var(--photo-width));
      grid-template-rows: repeat(var(--rows), var(--photo-height));
      gap: var(--gap);
      padding: 5mm;
      box-sizing: border-box;
      box-shadow: 0 0 4px rgba(0, 0, 0, 0.1);
    }

    .photo-box {
      border: 1px solid black;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      width: var(--photo-width);
      height: var(--photo-height);
    }

    .photo-box img {
      max-width: 100%;
      max-height: 100%;
      object-fit: cover;
    }

    @media print {
      body {
        padding: 0;
        background: white;
      }

      .controls {
        display: none;
      }

      .print-area {
        box-shadow: none;
        margin: 0;
        page-break-after: always;
      }
    }
  </style>
</head>
<body>

  <div class="controls">
    <input type="file" id="photoUpload" multiple accept="image/*">
    <button onclick="window.print()">Print</button>
  </div>

  <div class="print-area" id="printArea"></div>

  <script>
    const photoUpload = document.getElementById("photoUpload");
    const printArea = document.getElementById("printArea");

    photoUpload.addEventListener("change", () => {
      const files = Array.from(photoUpload.files).slice(0, 45); // Max 45 photos
      printArea.innerHTML = ""; // Clear previous

      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const box = document.createElement("div");
          box.className = "photo-box";

          const img = document.createElement("img");
          img.src = e.target.result;

          box.appendChild(img);
          printArea.appendChild(box);
        };
        reader.readAsDataURL(file);
      });
    });
  </script>

</body>
</html>
