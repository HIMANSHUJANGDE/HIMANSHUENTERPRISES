<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Advanced Photo Editor + BG Remove</title>
  <style>
    body { font-family:sans-serif; background:#222; color:#fff; text-align:center; margin:0; padding:20px; }
    h1 { margin-bottom:20px; }
    .editor { max-width:1000px; margin:auto; }
    .canvas-wrap { position:relative; display:inline-block; }
    canvas { border:1px solid #555; max-width:100%; cursor:crosshair; }
    #cropBox { position:absolute; border:2px dashed lime; display:none; pointer-events:none; }
    .controls { margin-top:20px; text-align:left; }
    .section { margin:10px 0; }
    label { margin-right:10px; }
    input[type=range] { width:120px; }
    button { margin:4px; padding:6px 12px; background:#444; border:none; color:white; cursor:pointer; }
    button:hover { background:#555; }
    #bgColor { width:50px; height:30px; vertical-align:middle; }
  </style>
</head>
<body>
  <div class="editor">
    <h1>Advanced Photo Editor + BG Remove/Replace</h1>
    <div class="section">
      <input type="file" id="upload" accept="image/*">
      or upload background: <input type="file" id="bgUpload" accept="image/*">
      bgcolor: <input type="color" id="bgColor" value="#222">
    </div>
    <div class="canvas-wrap">
      <canvas id="canvas"></canvas>
      <div id="cropBox"></div>
    </div>
    <div class="controls">
      <div class="section"><h3>Filters</h3>
        <label>B <input type="range" id="brightness" min="0" max="2" step="0.1" value="1"></label>
        <label>C <input type="range" id="contrast" min="0" max="2" step="0.1" value="1"></label>
        <label>S <input type="range" id="saturation" min="0" max="2" step="0.1" value="1"></label>
        <label>H <input type="range" id="hue" min="0" max="360" step="1" value="0"></label>
        <label>Blur <input type="range" id="blur" min="0" max="10" step="0.5" value="0"></label>
        <button onclick="resetFilters()">Reset</button>
      </div>
      <div class="section"><h3>Presets</h3>
        <button onclick="applyPreset('grayscale')">Grayscale</button>
        <button onclick="applyPreset('sepia')">Sepia</button>
        <button onclick="applyPreset('invert')">Invert</button>
      </div>
      <div class="section"><h3>Transform</h3>
        <button onclick="rotateImage()">Rotate 90°</button>
        <button onclick="flipImage('h')">Flip H</button>
        <button onclick="flipImage('v')">Flip V</button>
      </div>
      <div class="section"><h3>Crop</h3>
        <button onclick="startCrop()">Start Crop</button>
        <button onclick="applyCrop()">Apply Crop</button>
        <button onclick="cancelCrop()">Cancel</button>
      </div>
      <div class="section"><h3>Draw & Text</h3>
        <button onclick="toggleDraw()">Draw</button>
        <button onclick="addText()">Add Text</button>
        <button onclick="clearAnnotations()">Clear Drawing/Text</button>
      </div>
      <div class="section"><h3>Background</h3>
        <button onclick="removeBackground()">Remove BG</button>
        <button onclick="toggleReplaceMode()">Replace BG</button>
      </div>
      <div class="section">
        <button onclick="downloadImage()">Download Final Image</button>
      </div>
    </div>
  </div>
<script>
  const canvas = document.getElementById("canvas"), ctx = canvas.getContext("2d");
  const upload = document.getElementById("upload"), bgUpload = document.getElementById("bgUpload"), bgColorInput = document.getElementById("bgColor"), cropBox = document.getElementById("cropBox");
  let img = new Image(), bgImg = null;
  let filters = {b:1, c:1, s:1, h:0, bl:0}, rotation=0, flipH=false, flipV=false;
  let cropping=false, cropStart=null, cropRect=null;
  let drawMode=false, isDrawing=false, annotations=[], replaceMode=false;

  upload.onchange = e=>{
    let f=e.target.files[0]; if(!f)return;
    let fr=new FileReader(); fr.onload = ()=>{
      img.onload = resetAll; img.src=fr.result;
    }; fr.readAsDataURL(f);
  };
  bgUpload.onchange = e=>{
    let f=e.target.files[0]; if(!f)return;
    let fr=new FileReader(); fr.onload = ()=>{
      let tmp=new Image(); tmp.onload=()=>bgImg=tmp; tmp.src=fr.result;
    }; fr.readAsDataURL(f);
  };
  document.querySelectorAll("input[type=range]").forEach(sl=>{
    sl.oninput = ()=> {
      filters.b=+brightness.value; filters.c=+contrast.value;
      filters.s=+saturation.value; filters.h=+hue.value; filters.bl=+blur.value;
      drawAll();
    };
  });
  function resetFilters(){
    [brightness,contrast,saturation].forEach(r=>r.value=1);
    hue.value=0; blur.value=0;
    filters={b:1,c:1,s:1,h:0,bl:0};
    drawAll();
  }
  function applyPreset(type){
    if(type==="grayscale") filters={b:1,c:1,s:0,h:0,bl:0};
    if(type==="sepia") filters={b:1,c:1,s:1,h:30,bl:0};
    if(type==="invert") filters={b:1,c:1,s:1,h:180,bl:0};
    drawAll();
  }
  function rotateImage(){ rotation=(rotation+90)%360; drawAll(); }
  function flipImage(d){ if(d==="h") flipH=!flipH; else flipV=!flipV; drawAll(); }
  function startCrop(){ cropping=true; cropBox.style.display="block"; }
  canvas.onmousedown = e=>{
    const pos=mouse(e);
    if(drawMode){ isDrawing=true; annotations.push({type:'line',points:[pos],color:'#ff0',size:2}); }
    else if(cropping){ cropStart=pos; }
  };
  canvas.onmousemove = e=>{
    const pos=mouse(e);
    if(cropping && cropStart){
      cropRect={x:Math.min(cropStart.x,pos.x), y:Math.min(cropStart.y,pos.y), w:Math.abs(pos.x-cropStart.x), h:Math.abs(pos.y-cropStart.y)};
      Object.assign(cropBox.style, {left:cropRect.x+'px',top:cropRect.y+'px',width:cropRect.w+'px',height:cropRect.h+'px'});
    } else if(drawMode && isDrawing){
      let cur=annotations[annotations.length-1]; cur.points.push(pos); drawAll();
    }
  };
  window.onmouseup = ()=>{ cropping=false; isDrawing=false; }
  function applyCrop(){
    if(!cropRect) return;
    let tmp=document.createElement("canvas"), tctx=tmp.getContext("2d");
    tmp.width=cropRect.w; tmp.height=cropRect.h;
    tctx.drawImage(canvas,cropRect.x,cropRect.y,cropRect.w,cropRect.h,0,0,cropRect.w,cropRect.h);
    canvas.width=tmp.width; canvas.height=tmp.height; ctx.drawImage(tmp,0,0);
    cropBox.style.display="none"; cropRect=null; cropStart=null;
    drawAll();
  }
  function cancelCrop(){ cropping=false; cropBox.style.display="none"; cropRect=null; cropStart=null; }
  function toggleDraw(){ drawMode=!drawMode; canvas.style.cursor = drawMode?'crosshair':'default'; }
  function addText(){ let txt=prompt("Text?"); if(!txt)return; let pos=prompt("Enter x,y offset"); let [x,y]= (pos && pos.match(/\d+,\d+/)?pos.split(','): [10,30]).map(Number);
    annotations.push({type:'text',x,y,text:txt,color:'#0f0',size:20}); drawAll(); }
  function clearAnnotations(){ annotations=[]; drawAll(); }
  
  function removeBackground(){
    let id=ctx.getImageData(0,0,canvas.width,canvas.height), d=id.data;
    for(let i=0;i<d.length;i+=4){
      if(d[i]>200 && d[i+1]>200 && d[i+2]>200){ d[i+3]=0; }
    }
    ctx.putImageData(id,0,0);
  }
  function toggleReplaceMode(){ replaceMode=!replaceMode; drawAll(); }

  function drawAll(){
    let w=img.width, h=img.height;
    canvas.width=w; canvas.height=h;
    ctx.clearRect(0,0,w,h);
    ctx.save();
    if(replaceMode){
      if(bgImg) ctx.drawImage(bgImg,0,0,w,h);
      else { ctx.fillStyle=bgColorInput.value; ctx.fillRect(0,0,w,h); }
    }
    ctx.filter = `brightness(${filters.b}) contrast(${filters.c}) saturate(${filters.s}) hue-rotate(${filters.h}deg) blur(${filters.bl}px)`;
    ctx.translate(w/2, h/2);
    ctx.rotate(rotation*Math.PI/180);
    ctx.scale(flipH?-1:1, flipV?-1:1);
    ctx.drawImage(img,-w/2,-h/2);
    ctx.restore();

    annotations.forEach(o=>{
      if(o.type==='line'){
        ctx.strokeStyle=o.color; ctx.lineWidth=o.size;
        ctx.beginPath(); o.points.forEach((p,i)=> i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
        ctx.stroke();
      } else {
        ctx.fillStyle=o.color; ctx.font=`${o.size}px sans-serif`; ctx.fillText(o.text,o.x,o.y);
      }
    });
  }
  function mouse(e){
    let r=canvas.getBoundingClientRect();
    return {x:e.clientX-r.left, y:e.clientY-r.top};
  }
  function resetAll(){ rotation=0; flipH=false; flipV=false; annotations=[]; filters={b:1,c:1,s:1,h:0,bl:0}; resetFilters(); drawAll(); }
  function downloadImage(){
    let a=document.createElement("a"); a.href=canvas.toDataURL("image/png"); a.download="edited.png"; a.click();
  }
</script>
</body>
</html>
