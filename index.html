<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Compact Photo Print - 45 per A4</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f0f0f0;
    }
    .controls {
      padding: 12px;
      text-align: center;
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .controls input, .controls button {
      padding: 8px 12px;
      margin: 5px;
      font-size: 14px;
    }

    .page {
      width: 210mm;
      height: 297mm;
      background: white;
      margin: 10px auto;
      display: grid;
      grid-template-columns: repeat(5, 3.5cm);
      grid-template-rows: repeat(9, 2.5cm);
      gap: 0;
      page-break-after: always;
      overflow: hidden;
    }

    .photo {
      width: 3.5cm;
      height: 2.5cm;
      border: 1px solid #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: rotate(0deg); /* Landscape orientation */
    }

    @media print {
      body {
        background: none;
      }
      .controls {
        display: none;
      }
      .page {
        margin: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>

<div class="controls">
  <input type="file" id="fileInput" multiple accept="image/*">
  <input type="number" id="pcsInput" placeholder="PCS (Copies per image)" min="1" value="1">
  <button onclick="generatePages()">🧩 Generate</button>
  <button onclick="window.print()">🖨️ Print</button>
</div>

<div id="output"></div>

<script>
  const PHOTOS_PER_PAGE = 45;
  const fileInput = document.getElementById('fileInput');
  const pcsInput = document.getElementById('pcsInput');
  const output = document.getElementById('output');

  function generatePages() {
    const files = Array.from(fileInput.files);
    const pcs = parseInt(pcsInput.value) || 1;

    if (!files.length) {
      alert("Please upload images.");
      return;
    }

    const allImages = [];

    // Multiply each image by PCS count
    files.forEach(file => {
      for (let i = 0; i < pcs; i++) {
        allImages.push(file);
      }
    });

    output.innerHTML = ''; // Clear old content
    const totalPages = Math.ceil(allImages.length / PHOTOS_PER_PAGE);

    for (let pageIndex = 0; pageIndex < totalPages; pageIndex++) {
      const pageDiv = document.createElement('div');
      pageDiv.className = 'page';

      const imagesForPage = allImages.slice(
        pageIndex * PHOTOS_PER_PAGE,
        (pageIndex + 1) * PHOTOS_PER_PAGE
      );

      imagesForPage.forEach(file => {
        const reader = new FileReader();
        reader.onload = function (event) {
          const photoDiv = document.createElement('div');
          photoDiv.className = 'photo';

          const img = document.createElement('img');
          img.src = event.target.result;

          photoDiv.appendChild(img);
          pageDiv.appendChild(photoDiv);
        };
        reader.readAsDataURL(file);
      });

      output.appendChild(pageDiv);
    }
  }
</script>

</body>
</html>
