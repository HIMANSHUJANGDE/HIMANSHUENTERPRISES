<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Compact Photo Printing - 45 Per A4</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }
    .controls {
      padding: 10px;
      background: #fff;
      text-align: center;
    }
    .controls input, .controls button {
      margin: 5px;
      padding: 8px 12px;
      font-size: 14px;
    }

    .page {
      width: 210mm;
      height: 297mm;
      display: grid;
      grid-template-columns: repeat(5, 3.5cm);
      grid-template-rows: repeat(9, 2.5cm);
      gap: 0;
      margin: 10px auto;
      background: #fff;
      page-break-after: always;
    }

    .photo {
      width: 3.5cm;
      height: 2.5cm;
      border: 1px solid #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: rotate(0deg); /* landscape */
    }

    @media print {
      body { background: none; }
      .controls { display: none; }
      .page {
        margin: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>

<div class="controls">
  <input type="file" id="fileInput" accept="image/*" multiple>
  <input type="number" id="pcsInput" min="1" value="1" placeholder="PCS (Copies)">
  <button onclick="generateLayout()">🧩 Generate</button>
  <button onclick="window.print()">🖨️ Print</button>
</div>

<div id="output"></div>

<script>
  const fileInput = document.getElementById('fileInput');
  const pcsInput = document.getElementById('pcsInput');
  const output = document.getElementById('output');

  const PHOTOS_PER_PAGE = 45;

  function generateLayout() {
    const files = Array.from(fileInput.files);
    const pcs = parseInt(pcsInput.value) || 1;

    if (files.length === 0) {
      alert("Please upload some images.");
      return;
    }

    const allPhotos = [];
    files.forEach(file => {
      for (let i = 0; i < pcs; i++) {
        allPhotos.push(file);
      }
    });

    output.innerHTML = '';
    const totalPages = Math.ceil(allPhotos.length / PHOTOS_PER_PAGE);

    for (let pageIndex = 0; pageIndex < totalPages; pageIndex++) {
      const pageDiv = document.createElement('div');
      pageDiv.className = 'page';

      const pageImages = allPhotos.slice(
        pageIndex * PHOTOS_PER_PAGE,
        (pageIndex + 1) * PHOTOS_PER_PAGE
      );

      pageImages.forEach(file => {
        const reader = new FileReader();
        reader.onload = function (e) {
          const photoDiv = document.createElement('div');
          photoDiv.className = 'photo';

          const img = document.createElement('img');
          img.src = e.target.result;

          photoDiv.appendChild(img);
          pageDiv.appendChild(photoDiv);
        };
        reader.readAsDataURL(file);
      });

      output.appendChild(pageDiv);
    }
  }
</script>

</body>
</html>
