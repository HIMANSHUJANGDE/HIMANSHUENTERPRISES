<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Print 45 Landscape Photos on A4 Portrait</title>
  <style>
    :root {
      --photo-width: 32mm;  /* Landscape width */
      --photo-height: 24mm; /* Landscape height */
      --columns: 5;
      --rows: 9;
      --gap: 2mm;
    }

    body {
      margin: 0;
      padding: 10mm;
      background: #eee;
      font-family: sans-serif;
    }

    .controls {
      margin-bottom: 10px;
    }

    .controls input,
    .controls button {
      font-size: 14px;
      padding: 6px 12px;
      margin-right: 8px;
    }

    .print-area {
      background: #fff;
      width: 210mm;
      height: 297mm;
      display: grid;
      grid-template-columns: repeat(var(--columns), var(--photo-width));
      grid-template-rows: repeat(var(--rows), var(--photo-height));
      gap: var(--gap);
      padding: 5mm;
      box-sizing: border-box;
      margin: auto;
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.15);
    }

    .photo-box {
      width: var(--photo-width);
      height: var(--photo-height);
      border: 1px solid #000;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .photo-box img {
      max-width: 100%;
      max-height: 100%;
      object-fit: cover;
    }

    @media print {
      body {
        padding: 0;
        background: white;
      }

      .controls {
        display: none;
      }

      .print-area {
        box-shadow: none;
        margin: 0;
        page-break-after: always;
      }
    }
  </style>
</head>
<body>

  <div class="controls">
    <input type="file" id="photoInput" accept="image/*" multiple />
    <button onclick="window.print()">Print</button>
  </div>

  <div class="print-area" id="printArea"></div>

  <script>
    const photoInput = document.getElementById('photoInput');
    const printArea = document.getElementById('printArea');

    photoInput.addEventListener('change', () => {
      const files = Array.from(photoInput.files).slice(0, 45); // Limit to 45
      printArea.innerHTML = ''; // Clear previous photos

      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
          const box = document.createElement('div');
          box.className = 'photo-box';

          const img = document.createElement('img');
          img.src = e.target.result;

          box.appendChild(img);
          printArea.appendChild(box);
        };
        reader.readAsDataURL(file);
      });
    });
  </script>

</body>
</html>
