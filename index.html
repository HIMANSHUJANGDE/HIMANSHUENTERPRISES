<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>45 Photo Layout - Print Ready</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }
    .container {
      width: 210mm;
      height: 297mm;
      padding: 10mm;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-content: flex-start;
      background: white;
    }
    .photo {
      width: 3cm;
      height: 2cm;
      margin: 1mm;
      border: 1px solid #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: rotate(0deg);
    }
    @media print {
      body {
        margin: 0;
      }
      .no-print {
        display: none;
      }
      .container {
        page-break-after: always;
      }
    }
    .controls {
      margin: 10px;
    }
  </style>
</head>
<body>

<div class="controls no-print">
  <input type="file" id="upload" accept="image/*" multiple>
  <button onclick="window.print()">🖨️ Print</button>
</div>

<div id="pages"></div>

<script>
  const uploadInput = document.getElementById('upload');
  const pagesContainer = document.getElementById('pages');

  uploadInput.addEventListener('change', function (e) {
    const files = Array.from(e.target.files);
    if (files.length === 0) return;

    const totalPhotosPerPage = 45;
    const pages = Math.ceil(files.length / totalPhotosPerPage);

    pagesContainer.innerHTML = '';

    for (let i = 0; i < pages; i++) {
      const pageDiv = document.createElement('div');
      pageDiv.classList.add('container');

      const currentFiles = files.slice(i * totalPhotosPerPage, (i + 1) * totalPhotosPerPage);

      currentFiles.forEach(file => {
        const reader = new FileReader();
        reader.onload = function (event) {
          const photoDiv = document.createElement('div');
          photoDiv.classList.add('photo');

          const img = document.createElement('img');
          img.src = event.target.result;

          photoDiv.appendChild(img);
          pageDiv.appendChild(photoDiv);
        };
        reader.readAsDataURL(file);
      });

      pagesContainer.appendChild(pageDiv);
    }
  });
</script>

</body>
</html>
