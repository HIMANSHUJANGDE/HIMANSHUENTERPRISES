<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Code Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    .container {
      background: #fff;
      padding: 20px;
      max-width: 500px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      color: #333;
    }

    #reader {
      width: 100%;
      margin-top: 20px;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      color: green;
    }

    .error {
      color: red;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>QR Code Scanner</h1>
    <div id="reader"></div>
    <div class="result" id="scan-result">Scanned Result: <span id="result-text">None</span></div>
  </div>

  <script>
    function onScanSuccess(decodedText, decodedResult) {
      document.getElementById("result-text").textContent = decodedText;
    }

    function onScanFailure(error) {
      // Optional: console.warn(`Scan error: ${error}`);
    }

    const html5QrCode = new Html5Qrcode("reader");

    Html5Qrcode.getCameras().then(cameras => {
      if (cameras && cameras.length) {
        html5QrCode.start(
          { facingMode: "environment" }, // rear camera
          {
            fps: 10,
            qrbox: 250
          },
          onScanSuccess,
          onScanFailure
        );
      } else {
        document.getElementById("result-text").textContent = "No cameras found.";
      }
    }).catch(err => {
      document.getElementById("result-text").textContent = "Camera error.";
      console.error(err);
    });
  </script>

</body>
</html>
