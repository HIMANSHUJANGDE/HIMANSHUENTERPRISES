<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ID Card Print System - Landscape</title>
  <style>
    @page {
      size: A4 portrait;
      margin: 10mm;
    }

    body {
      font-family: sans-serif;
      margin: 0;
      padding: 10mm;
      background: #f0f0f0;
    }

    .controls {
      text-align: center;
      margin-bottom: 20px;
    }

    .controls button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 0 10px;
    }

    .upload-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-bottom: 30px;
    }

    .upload-item {
      background: #fff;
      border: 1px dashed #999;
      padding: 10px;
      width: 240px;
      font-size: 14px;
    }

    .upload-item label {
      display: block;
      margin: 6px 0 2px;
    }

    .card-list {
      display: flex;
      flex-direction: column;
      gap: 10mm;
    }

    .merged-card {
      width: 8.6cm;
      height: 5.4cm;
      border: 1px solid #000;
      background: #fff;
      display: flex;
      overflow: hidden;
    }

    .merged-card img {
      width: 50%;
      height: 100%;
      object-fit: cover;
      border-right: 1px solid #000;
    }

    .merged-card img:last-child {
      border-right: none;
    }

    @media print {
      .controls,
      .upload-group {
        display: none;
      }

      body {
        background: white;
      }
    }
  </style>
</head>
<body>

  <div class="controls">
    <button onclick="generateCards()">Generate Cards</button>
    <button onclick="window.print()">Print</button>
  </div>

  <div class="upload-group" id="uploadGroup"></div>

  <div class="card-list" id="mergedCardList"></div>

  <script>
    const MAX_CARDS = 5;
    const uploadGroup = document.getElementById('uploadGroup');
    const mergedCardList = document.getElementById('mergedCardList');

    // Create upload fields
    for (let i = 0; i < MAX_CARDS; i++) {
      const div = document.createElement('div');
      div.className = 'upload-item';
      div.innerHTML = `
        <strong>Card ${i + 1}</strong>
        <label>Front JPG</label>
        <input type="file" accept="image/jpeg" id="front${i}">
        <label>Back JPG</label>
        <input type="file" accept="image/jpeg" id="back${i}">
        <label>Copies (pcs)</label>
        <input type="number" id="copies${i}" value="1" min="1" max="20">
      `;
      uploadGroup.appendChild(div);
    }

    function generateCards() {
      mergedCardList.innerHTML = '';

      for (let i = 0; i < MAX_CARDS; i++) {
        const frontInput = document.getElementById(`front${i}`);
        const backInput = document.getElementById(`back${i}`);
        const copies = parseInt(document.getElementById(`copies${i}`).value);

        const frontFile = frontInput.files[0];
        const backFile = backInput.files[0];

        if (!frontFile || !backFile || isNaN(copies) || copies < 1) continue;

        const frontReader = new FileReader();
        const backReader = new FileReader();

        frontReader.onload = (eFront) => {
          const frontSrc = eFront.target.result;

          backReader.onload = (eBack) => {
            const backSrc = eBack.target.result;

            for (let j = 0; j < copies; j++) {
              const card = document.createElement('div');
              card.className = 'merged-card';
              card.innerHTML = `
                <img src="${frontSrc}" alt="Front ${i + 1}">
                <img src="${backSrc}" alt="Back ${i + 1}">
              `;
              mergedCardList.appendChild(card);
            }
          };

          backReader.readAsDataURL(backFile);
        };

        frontReader.readAsDataURL(frontFile);
      }
    }
  </script>

</body>
</html>
