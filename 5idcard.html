<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>10 ID Cards - Double-Sided A4 Print</title>
  <style>
    @page {
      size: A4;
      margin: 10mm;
    }

    body {
      font-family: sans-serif;
      margin: 0;
      padding: 10mm;
      background: #f0f0f0;
    }

    .controls {
      text-align: center;
      margin-bottom: 20px;
    }

    .controls input,
    .controls button {
      padding: 8px;
      font-size: 14px;
      margin: 5px;
    }

    .upload-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .upload-item {
      background: #fff;
      border: 1px dashed #aaa;
      padding: 10px;
      width: 240px;
    }

    .upload-item label {
      display: block;
      font-size: 13px;
      margin-top: 5px;
    }

    .id-card-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10mm;
    }

    .id-card {
      border: 1px solid #000;
      background: white;
      padding: 5px;
      box-sizing: border-box;
      height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .id-card img {
      max-width: 100%;
      max-height: 100%;
    }

    .page-break {
      page-break-before: always;
    }

    @media print {
      .controls,
      .upload-group {
        display: none;
      }

      body {
        background: white;
      }
    }
  </style>
</head>
<body>

  <div class="controls">
    <button onclick="generateCards()">🧾 Generate Cards</button>
    <button onclick="window.print()">🖨️ Print</button>
  </div>

  <div class="upload-group" id="uploadGroup">
    <!-- Upload slots inserted here -->
  </div>

  <h2 style="text-align:center;">Front Side</h2>
  <div class="id-card-container" id="frontContainer"></div>

  <div class="page-break"></div>

  <h2 style="text-align:center;">Back Side</h2>
  <div class="id-card-container" id="backContainer"></div>

  <script>
    const uploadGroup = document.getElementById('uploadGroup');
    const frontContainer = document.getElementById('frontContainer');
    const backContainer = document.getElementById('backContainer');
    const CARD_COUNT = 10;

    // Create 10 upload blocks
    for (let i = 0; i < CARD_COUNT; i++) {
      const block = document.createElement('div');
      block.className = 'upload-item';

      block.innerHTML = `
        <label><strong>Card ${i + 1}</strong></label>
        <label>Front JPG:</label>
        <input type="file" accept="image/jpeg" id="front${i}" />
        <label>Back JPG:</label>
        <input type="file" accept="image/jpeg" id="back${i}" />
        <label>Copies (pcs):</label>
        <input type="number" id="copies${i}" value="1" min="1" max="50" />
      `;

      uploadGroup.appendChild(block);
    }

    function generateCards() {
      frontContainer.innerHTML = '';
      backContainer.innerHTML = '';

      for (let i = 0; i < CARD_COUNT; i++) {
        const frontInput = document.getElementById(`front${i}`);
        const backInput = document.getElementById(`back${i}`);
        const copies = parseInt(document.getElementById(`copies${i}`).value);

        const frontFile = frontInput.files[0];
        const backFile = backInput.files[0];

        if (!frontFile || !backFile || isNaN(copies) || copies < 1) continue;

        const frontReader = new FileReader();
        const backReader = new FileReader();

        frontReader.onload = function (eventFront) {
          const frontImgSrc = eventFront.target.result;

          backReader.onload = function (eventBack) {
            const backImgSrc = eventBack.target.result;

            for (let j = 0; j < copies; j++) {
              const frontCard = document.createElement('div');
              frontCard.className = 'id-card';
              frontCard.innerHTML = `<img src="${frontImgSrc}" alt="Front ${i + 1}">`;
              frontContainer.appendChild(frontCard);

              const backCard = document.createElement('div');
              backCard.className = 'id-card';
              backCard.innerHTML = `<img src="${backImgSrc}" alt="Back ${i + 1}">`;
              backContainer.appendChild(backCard);
            }
          };

          backReader.readAsDataURL(backFile);
        };

        frontReader.readAsDataURL(frontFile);
      }
    }
  </script>

</body>
</html>
