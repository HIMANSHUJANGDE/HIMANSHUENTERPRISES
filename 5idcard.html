<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Merged ID Card Printing (Front + Back)</title>
  <style>
    @page {
      size: A4;
      margin: 10mm;
    }

    body {
      font-family: sans-serif;
      margin: 0;
      padding: 10mm;
      background: #f9f9f9;
    }

    .controls {
      text-align: center;
      margin-bottom: 20px;
    }

    .controls input,
    .controls button {
      padding: 8px;
      font-size: 14px;
      margin: 5px;
    }

    .upload-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .upload-item {
      background: #fff;
      border: 1px dashed #aaa;
      padding: 10px;
      width: 240px;
    }

    .upload-item label {
      display: block;
      font-size: 13px;
      margin-top: 5px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10mm;
    }

    .merged-card {
      border: 1px solid #000;
      background: white;
      display: flex;
      height: 250px;
      overflow: hidden;
    }

    .merged-card img {
      width: 50%;
      height: 100%;
      object-fit: contain;
      border-right: 1px solid #000;
    }

    .merged-card img:last-child {
      border-right: none;
    }

    @media print {
      .controls,
      .upload-group {
        display: none;
      }

      body {
        background: white;
      }
    }
  </style>
</head>
<body>

  <div class="controls">
    <button onclick="generateCards()">🧾 Generate Merged Cards</button>
    <button onclick="window.print()">🖨️ Print</button>
  </div>

  <div class="upload-group" id="uploadGroup"></div>

  <div class="card-grid" id="mergedCardGrid"></div>

  <script>
    const uploadGroup = document.getElementById('uploadGroup');
    const mergedCardGrid = document.getElementById('mergedCardGrid');
    const MAX_CARDS = 5;

    // Create 5 upload blocks
    for (let i = 0; i < MAX_CARDS; i++) {
      const block = document.createElement('div');
      block.className = 'upload-item';

      block.innerHTML = `
        <label><strong>Card ${i + 1}</strong></label>
        <label>Front JPG:</label>
        <input type="file" accept="image/jpeg" id="front${i}" />
        <label>Back JPG:</label>
        <input type="file" accept="image/jpeg" id="back${i}" />
        <label>Copies (pcs):</label>
        <input type="number" id="copies${i}" value="1" min="1" max="50" />
      `;

      uploadGroup.appendChild(block);
    }

    function generateCards() {
      mergedCardGrid.innerHTML = '';

      for (let i = 0; i < MAX_CARDS; i++) {
        const frontInput = document.getElementById(`front${i}`);
        const backInput = document.getElementById(`back${i}`);
        const copies = parseInt(document.getElementById(`copies${i}`).value);

        const frontFile = frontInput.files[0];
        const backFile = backInput.files[0];

        if (!frontFile || !backFile || isNaN(copies) || copies < 1) continue;

        const frontReader = new FileReader();
        const backReader = new FileReader();

        frontReader.onload = function (eventFront) {
          const frontSrc = eventFront.target.result;

          backReader.onload = function (eventBack) {
            const backSrc = eventBack.target.result;

            for (let j = 0; j < copies; j++) {
              const cardDiv = document.createElement('div');
              cardDiv.className = 'merged-card';
              cardDiv.innerHTML = `
                <img src="${frontSrc}" alt="Front ${i + 1}">
                <img src="${backSrc}" alt="Back ${i + 1}">
              `;
              mergedCardGrid.appendChild(cardDiv);
            }
          };

          backReader.readAsDataURL(backFile);
        };

        frontReader.readAsDataURL(frontFile);
      }
    }
  </script>

</body>
</html>
