<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ID Card JPG Upload & Print</title>
  <style>
    @page {
      size: A4;
      margin: 10mm;
    }

    body {
      font-family: sans-serif;
      margin: 0;
      padding: 10mm;
      background: #f0f0f0;
    }

    .controls {
      text-align: center;
      margin-bottom: 20px;
    }

    .controls input,
    .controls button {
      padding: 10px;
      font-size: 16px;
      margin: 5px;
    }

    .id-card-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10mm;
    }

    .id-card {
      background: white;
      border: 1px solid #000;
      box-sizing: border-box;
      padding: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 250px;
      overflow: hidden;
    }

    .id-card img {
      max-width: 100%;
      max-height: 100%;
    }

    @media print {
      .controls {
        display: none;
      }
      body {
        background: white;
      }
    }
  </style>
</head>
<body>

  <div class="controls">
    <input type="file" id="imageUpload" multiple accept="image/jpeg, image/jpg" />
    <button onclick="window.print()">🖨️ Print ID Cards</button>
  </div>

  <div class="id-card-container" id="cardContainer"></div>

  <script>
    const uploadInput = document.getElementById('imageUpload');
    const cardContainer = document.getElementById('cardContainer');

    uploadInput.addEventListener('change', function (e) {
      const files = Array.from(e.target.files);
      cardContainer.innerHTML = ''; // Clear previous cards

      files.forEach((file, index) => {
        if (!file.type.startsWith('image/')) return;

        const reader = new FileReader();
        reader.onload = function (event) {
          const img = document.createElement('img');
          img.src = event.target.result;

          const card = document.createElement('div');
          card.className = 'id-card';
          card.appendChild(img);

          cardContainer.appendChild(card);
        };
        reader.readAsDataURL(file);
      });
    });
  </script>

</body>
</html>
