<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ID Card Upload & Print - A4</title>
  <style>
    @page {
      size: A4;
      margin: 10mm;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 10mm;
      background: #f0f0f0;
    }

    .print-button {
      margin-bottom: 20px;
      text-align: center;
    }

    .print-button button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    .id-card-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-gap: 10mm;
    }

    .id-card {
      border: 1px solid #333;
      background: #fff;
      padding: 10px;
      height: 250px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-sizing: border-box;
    }

    .id-header {
      font-weight: bold;
      font-size: 16px;
      text-align: center;
      border-bottom: 1px solid #aaa;
      margin-bottom: 5px;
    }

    .id-photo {
      width: 100%;
      height: 100px;
      background: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 5px;
    }

    .id-photo img {
      max-width: 100%;
      max-height: 100%;
    }

    .id-info {
      font-size: 14px;
      line-height: 1.4;
    }

    .form-fields {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-top: 5px;
    }

    .form-fields input[type="text"] {
      padding: 4px;
      font-size: 14px;
    }

    .form-fields input[type="file"] {
      font-size: 12px;
    }

    @media print {
      .print-button, .form-fields {
        display: none;
      }

      body {
        background: #fff;
      }
    }
  </style>
</head>
<body>

  <div class="print-button">
    <button onclick="window.print()">🖨️ Print All ID Cards</button>
  </div>

  <div class="id-card-container" id="cardContainer">
    <!-- 5 Cards -->
  </div>

  <script>
    const cardContainer = document.getElementById('cardContainer');

    for (let i = 0; i < 5; i++) {
      const card = document.createElement('div');
      card.className = 'id-card';

      card.innerHTML = `
        <div class="id-header">Employee ID</div>
        <div class="id-photo" id="photoPreview${i}">No Photo</div>
        <div class="id-info" id="info${i}">
          <strong>Name:</strong> <span id="name${i}">--</span><br>
          <strong>Role:</strong> <span id="role${i}">--</span><br>
          <strong>ID:</strong> ID00${i + 1}
        </div>

        <div class="form-fields">
          <input type="text" placeholder="Enter name" oninput="document.getElementById('name${i}').innerText = this.value">
          <input type="text" placeholder="Enter role" oninput="document.getElementById('role${i}').innerText = this.value">
          <input type="file" accept="image/*" onchange="previewImage(event, ${i})">
        </div>
      `;

      cardContainer.appendChild(card);
    }

    function previewImage(event, index) {
      const reader = new FileReader();
      reader.onload = function(){
        const img = document.createElement('img');
        img.src = reader.result;
        const photoBox = document.getElementById('photoPreview' + index);
        photoBox.innerHTML = '';
        photoBox.appendChild(img);
      };
      reader.readAsDataURL(event.target.files[0]);
    }
  </script>

</body>
</html>
