<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ID Card JPG Upload + Copies + Print</title>
  <style>
    @page {
      size: A4;
      margin: 10mm;
    }

    body {
      font-family: sans-serif;
      margin: 0;
      padding: 10mm;
      background: #f0f0f0;
    }

    .controls {
      text-align: center;
      margin-bottom: 20px;
    }

    .controls input,
    .controls button {
      padding: 10px;
      font-size: 14px;
      margin: 5px;
    }

    .upload-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .upload-item {
      background: #fff;
      border: 1px dashed #aaa;
      padding: 10px;
      width: 200px;
    }

    .upload-item label {
      display: block;
      font-size: 14px;
      margin-top: 5px;
    }

    .id-card-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10mm;
    }

    .id-card {
      border: 1px solid #000;
      background: white;
      padding: 5px;
      box-sizing: border-box;
      height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .id-card img {
      max-width: 100%;
      max-height: 100%;
    }

    @media print {
      .controls,
      .upload-group {
        display: none;
      }

      body {
        background: white;
      }
    }
  </style>
</head>
<body>

  <div class="controls">
    <button onclick="generateCards()">🧾 Generate Cards</button>
    <button onclick="window.print()">🖨️ Print</button>
  </div>

  <div class="upload-group" id="uploadGroup">
    <!-- 5 upload blocks -->
  </div>

  <div class="id-card-container" id="cardContainer"></div>

  <script>
    const uploadGroup = document.getElementById('uploadGroup');
    const cardContainer = document.getElementById('cardContainer');

    for (let i = 0; i < 5; i++) {
      const block = document.createElement('div');
      block.className = 'upload-item';

      block.innerHTML = `
        <label>Upload Card ${i + 1}:</label>
        <input type="file" accept="image/jpeg" id="file${i}" />
        <label>Copies (pcs):</label>
        <input type="number" id="copies${i}" value="1" min="1" max="20" />
      `;

      uploadGroup.appendChild(block);
    }

    function generateCards() {
      cardContainer.innerHTML = ''; // Clear previous

      for (let i = 0; i < 5; i++) {
        const fileInput = document.getElementById(`file${i}`);
        const copiesInput = document.getElementById(`copies${i}`);

        const file = fileInput.files[0];
        const copies = parseInt(copiesInput.value);

        if (!file || isNaN(copies) || copies < 1) continue;

        const reader = new FileReader();
        reader.onload = function (event) {
          for (let j = 0; j < copies; j++) {
            const card = document.createElement('div');
            card.className = 'id-card';

            const img = document.createElement('img');
            img.src = event.target.result;

            card.appendChild(img);
            cardContainer.appendChild(card);
          }
        };
        reader.readAsDataURL(file);
      }
    }
  </script>

</body>
</html>
