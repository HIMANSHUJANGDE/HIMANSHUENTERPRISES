<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>45 Passport Photos on A4 Landscape</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f0f0f0;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 20px;
      display: inline-block;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    canvas {
      margin-top: 20px;
      border: 1px solid #ccc;
      max-width: 100%;
    }

    input, button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Passport Photo (45pcs) on A4 Landscape</h1>
    <input type="file" id="photoInput" accept="image/*">
    <br>
    <canvas id="outputCanvas" width="3508" height="2480"></canvas>
    <br>
    <button id="printBtn">Print</button>
  </div>

  <script>
    const photoInput = document.getElementById('photoInput');
    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');

    const PHOTO_WIDTH = 413; // 35mm @ 300 DPI
    const PHOTO_HEIGHT = 531; // 45mm @ 300 DPI
    const GAP = 20; // spacing between photos

    photoInput.addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (evt) {
        const img = new Image();
        img.onload = function () {
          // Crop to center square from the uploaded image
          const size = Math.min(img.width, img.height);
          const sx = (img.width - size) / 2;
          const sy = (img.height - size) / 2;

          // Resize to PHOTO_WIDTH x PHOTO_HEIGHT
          const tempCanvas = document.createElement('canvas');
          const tempCtx = tempCanvas.getContext('2d');
          tempCanvas.width = PHOTO_WIDTH;
          tempCanvas.height = PHOTO_HEIGHT;
          tempCtx.drawImage(img, sx, sy, size, size, 0, 0, PHOTO_WIDTH, PHOTO_HEIGHT);

          // Clear the main canvas
          ctx.fillStyle = '#fff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // Layout: 9 columns × 5 rows = 45 photos
          let x = GAP, y = GAP;
          const columns = 9;
          const rows = 5;

          for (let row = 0; row < rows; row++) {
            x = GAP;
            for (let col = 0; col < columns; col++) {
              ctx.drawImage(tempCanvas, x, y, PHOTO_WIDTH, PHOTO_HEIGHT);
              x += PHOTO_WIDTH + GAP;
            }
            y += PHOTO_HEIGHT + GAP;
          }
        };
        img.src = evt.target.result;
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('printBtn').addEventListener('click', function () {
      const dataUrl = canvas.toDataURL('image/png');
      const win = window.open('', '_blank');
      win.document.write(`
        <html>
          <head><title>Print 45 Passport Photos</title></head>
          <body style="margin:0">
            <img src="${dataUrl}" style="width:100%;" onload="window.print();window.close();">
          </body>
        </html>
      `);
    });
  </script>
</body>
</html>
