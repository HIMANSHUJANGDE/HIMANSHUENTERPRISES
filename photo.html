<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Passport Photo Sheet Generator (A4 Portrait)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 20px;
    }
    #canvas-container {
      width: 794px; /* A4 portrait at 96dpi */
      height: 1123px;
      margin: 20px auto;
    }
    canvas {
      border: 1px solid #000;
      background: #fff;
    }
    input, button {
      margin: 10px;
      padding: 10px;
    }
  </style>
</head>
<body>
  <h2>Passport Size Photo Sheet Generator</h2>
  <input type="file" id="fileInput" multiple accept="image/*">
  <br>
  <button onclick="generateSheet()">Generate</button>
  <button onclick="downloadSheet()">Download</button>

  <div id="canvas-container">
    <canvas id="photoCanvas" width="794" height="1123"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('photoCanvas');
    const ctx = canvas.getContext('2d');
    const fileInput = document.getElementById('fileInput');

    const MAX_PHOTOS = 32;
    const COLUMNS = 4;
    const ROWS = 8;

    // Passport size at 96 DPI: ~132x170 pixels (3.5x4.5cm)
    const PHOTO_WIDTH = 132;
    const PHOTO_HEIGHT = 170;
    const BORDER = 2;
    const MARGIN_X = 20;
    const MARGIN_Y = 20;
    const SPACING_X = (canvas.width - (COLUMNS * PHOTO_WIDTH) - (2 * MARGIN_X)) / (COLUMNS - 1);
    const SPACING_Y = (canvas.height - (ROWS * PHOTO_HEIGHT) - (2 * MARGIN_Y)) / (ROWS - 1);

    let images = [];

    fileInput.addEventListener('change', (e) => {
      images = [];
      const files = [...e.target.files].slice(0, MAX_PHOTOS);

      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            images.push(img);
            if (images.length === files.length) {
              generateSheet();
            }
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      });
    });

    function generateSheet() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let index = 0;

      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLUMNS; col++) {
          if (index >= images.length) return;
          const img = images[index];
          const x = MARGIN_X + col * (PHOTO_WIDTH + SPACING_X);
          const y = MARGIN_Y + row * (PHOTO_HEIGHT + SPACING_Y);

          ctx.save();
          ctx.translate(x + PHOTO_WIDTH / 2, y + PHOTO_HEIGHT / 2);

          // Rotate if landscape
          if (img.width > img.height) {
            ctx.rotate(Math.PI / 2);
            ctx.drawImage(img, -PHOTO_HEIGHT / 2, -PHOTO_WIDTH / 2, PHOTO_HEIGHT, PHOTO_WIDTH);
          } else {
            ctx.drawImage(img, -PHOTO_WIDTH / 2, -PHOTO_HEIGHT / 2, PHOTO_WIDTH, PHOTO_HEIGHT);
          }

          ctx.restore();

          // Border
          ctx.lineWidth = BORDER;
          ctx.strokeStyle = '#000';
          ctx.strokeRect(x, y, PHOTO_WIDTH, PHOTO_HEIGHT);

          index++;
        }
      }
    }

    function downloadSheet() {
      const link = document.createElement('a');
      link.download = 'passport_photo_sheet.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
