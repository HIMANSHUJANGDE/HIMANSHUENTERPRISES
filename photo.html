<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Passport Photo Printer</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f0f0f0;
      padding: 20px;
      text-align: center;
    }
    .container {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      display: inline-block;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input, button {
      margin: 10px;
      padding: 10px;
      font-size: 16px;
    }
    canvas {
      border: 1px solid #ccc;
      margin-top: 20px;
      max-width: 100%;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Passport Size Photo Printer (Auto Rotate)</h2>
    <label for="pcsInput">Number of copies:</label>
    <input type="number" id="pcsInput" value="32" min="1" max="100">
    <br>
    <input type="file" id="photoInput" accept="image/*">
    <br>
    <canvas id="outputCanvas" width="2480" height="3508"></canvas>
    <br>
    <button id="printBtn">Print</button>
  </div>

  <script>
    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');

    const PAGE_WIDTH = 2480;
    const PAGE_HEIGHT = 3508;

    const PHOTO_W = 413;  // 35mm @ 300 DPI
    const PHOTO_H = 531;  // 45mm @ 300 DPI
    const BORDER = 2;
    const GAP = 20;

    document.getElementById('photoInput').addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (!file) return;

      const pcs = parseInt(document.getElementById('pcsInput').value) || 32;
      const reader = new FileReader();

      reader.onload = function (evt) {
        const img = new Image();
        img.onload = function () {
          const rotate = img.width < img.height; // Rotate to landscape if portrait

          const tempCanvas = document.createElement('canvas');
          const tempCtx = tempCanvas.getContext('2d');

          if (rotate) {
            tempCanvas.width = PHOTO_H;
            tempCanvas.height = PHOTO_W;
            tempCtx.translate(PHOTO_H / 2, PHOTO_W / 2);
            tempCtx.rotate(Math.PI / 2);
            tempCtx.drawImage(img, -img.height / 2, -img.width / 2, img.height, img.width);
          } else {
            tempCanvas.width = PHOTO_W;
            tempCanvas.height = PHOTO_H;
            tempCtx.drawImage(img, 0, 0, PHOTO_W, PHOTO_H);
          }

          // Fill canvas white
          ctx.fillStyle = "#fff";
          ctx.fillRect(0, 0, PAGE_WIDTH, PAGE_HEIGHT);

          const photoWidth = tempCanvas.width;
          const photoHeight = tempCanvas.height;

          const cols = Math.floor((PAGE_WIDTH + GAP) / (photoWidth + GAP));
          const rows = Math.floor((PAGE_HEIGHT + GAP) / (photoHeight + GAP));
          const maxPhotos = cols * rows;

          if (pcs > maxPhotos) {
            alert(`Only ${maxPhotos} photos fit on one A4 page. Showing ${maxPhotos}.`);
          }

          let placed = 0;
          let y = GAP;
          for (let r = 0; r < rows && placed < pcs; r++) {
            let x = GAP;
            for (let c = 0; c < cols && placed < pcs; c++) {
              ctx.fillStyle = "#000";
              ctx.fillRect(x - BORDER, y - BORDER, photoWidth + 2 * BORDER, photoHeight + 2 * BORDER);
              ctx.drawImage(tempCanvas, x, y, photoWidth, photoHeight);
              placed++;
              x += photoWidth + GAP;
            }
            y += photoHeight + GAP;
          }
        };
        img.src = evt.target.result;
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('printBtn').addEventListener('click', () => {
      const dataUrl = canvas.toDataURL("image/png");
      const win = window.open('', '_blank');
      win.document.write(`
        <html>
          <head><title>Print</title></head>
          <body style="margin:0">
            <img src="${dataUrl}" style="width:100%" onload="window.print(); window.close();">
          </body>
        </html>
      `);
    });
  </script>
</body>
</html>
