<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Manager</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .container { padding: 20px; }
        .hidden { display: none; }
        .header { text-align: center; margin-bottom: 20px; }
        .form { width: 300px; margin: 0 auto; }
        input { width: 100%; padding: 10px; margin: 5px 0; }
        button { width: 100%; padding: 10px; margin: 5px 0; background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .password-list { margin-top: 20px; }
        .password-item { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .password-item button { background-color: #dc3545; }
        .password-item button:hover { background-color: #c82333; }
        .password-item input { width: 70%; }
    </style>
</head>
<body>

<div class="container">
    <!-- Login Form -->
    <div id="login-form" class="form">
        <h2 class="header">Login</h2>
        <input type="text" id="login-username" placeholder="Username">
        <input type="password" id="login-password" placeholder="Password">
        <button onclick="login()">Login</button>
        <button onclick="showRegisterForm()">Create Account</button>
    </div>

    <!-- Register Form -->
    <div id="register-form" class="form hidden">
        <h2 class="header">Register</h2>
        <input type="text" id="register-username" placeholder="Username">
        <input type="password" id="register-password" placeholder="Password">
        <button onclick="register()">Register</button>
        <button onclick="showLoginForm()">Back to Login</button>
    </div>

    <!-- Password Manager Form -->
    <div id="password-manager" class="hidden">
        <h2 class="header">Password Manager</h2>
        <input type="text" id="service-name" placeholder="Service Name">
        <input type="password" id="service-password" placeholder="Password">
        <button onclick="addPassword()">Add Password</button>
        <div class="password-list" id="password-list"></div>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<script>
    // Store current logged-in user
    let currentUser = null;

    // Show login form
    function showLoginForm() {
        document.getElementById("login-form").classList.remove("hidden");
        document.getElementById("register-form").classList.add("hidden");
        document.getElementById("password-manager").classList.add("hidden");
    }

    // Show register form
    function showRegisterForm() {
        document.getElementById("login-form").classList.add("hidden");
        document.getElementById("register-form").classList.remove("hidden");
        document.getElementById("password-manager").classList.add("hidden");
    }

    // Show password manager
    function showPasswordManager() {
        document.getElementById("login-form").classList.add("hidden");
        document.getElementById("register-form").classList.add("hidden");
        document.getElementById("password-manager").classList.remove("hidden");
        loadPasswords();
    }

    // Register new user
    function register() {
        const username = document.getElementById("register-username").value;
        const password = document.getElementById("register-password").value;
        
        if (!username || !password) {
            alert("Please fill out both fields.");
            return;
        }

        const users = JSON.parse(localStorage.getItem("users")) || [];
        if (users.find(user => user.username === username)) {
            alert("User already exists.");
            return;
        }

        users.push({ username, password, passwords: [] });
        localStorage.setItem("users", JSON.stringify(users));

        alert("Account created! You can now log in.");
        showLoginForm();
    }

    // Login existing user
    function login() {
        const username = document.getElementById("login-username").value;
        const password = document.getElementById("login-password").value;

        if (!username || !password) {
            alert("Please fill out both fields.");
            return;
        }

        const users = JSON.parse(localStorage.getItem("users")) || [];
        const user = users.find(user => user.username === username && user.password === password);

        if (!user) {
            alert("Invalid credentials.");
            return;
        }

        currentUser = user;
        showPasswordManager();
    }

    // Logout user
    function logout() {
        currentUser = null;
        showLoginForm();
    }

    // Add password for a service
    function addPassword() {
        const serviceName = document.getElementById("service-name").value;
        const servicePassword = document.getElementById("service-password").value;

        if (!serviceName || !servicePassword) {
            alert("Please fill out both fields.");
            return;
        }

        currentUser.passwords.push({ service: serviceName, password: servicePassword });
        saveUserData();
        loadPasswords();
    }

    // Delete password for a service
    function deletePassword(index) {
        currentUser.passwords.splice(index, 1);
        saveUserData();
        loadPasswords();
    }

    // Update password for a service
    function updatePassword(index) {
        const newPassword = prompt("Enter new password:", currentUser.passwords[index].password);
        if (newPassword) {
            currentUser.passwords[index].password = newPassword;
            saveUserData();
            loadPasswords();
        }
    }

    // Save the current user's data to localStorage
    function saveUserData() {
        const users = JSON.parse(localStorage.getItem("users")) || [];
        const updatedUsers = users.map(user =>
            user.username === currentUser.username ? currentUser : user
        );
        localStorage.setItem("users", JSON.stringify(updatedUsers));
    }

    // Load and display the user's saved passwords
    function loadPasswords() {
        const passwordList = document.getElementById("password-list");
        passwordList.innerHTML = "";

        currentUser.passwords.forEach((item, index) => {
            const div = document.createElement("div");
            div.classList.add("password-item");

            div.innerHTML = `
                <span>${item.service}: ${item.password}</span>
                <button onclick="deletePassword(${index})">Delete</button>
                <button onclick="updatePassword(${index})">Update</button>
            `;
            passwordList.appendChild(div);
        });
    }

    // Initialize the app
    function init() {
        const users = JSON.parse(localStorage.getItem("users")) || [];
        if (users.length === 0) {
            showRegisterForm();
        } else {
            showLoginForm();
        }
    }

    init();
</script>
</body>
</html>
