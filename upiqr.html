<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UPI QR Code Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f3f3;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h2 {
      color: #333;
    }

    form {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
    }

    input, button {
      padding: 10px;
      margin: 10px 0;
      width: 100%;
      font-size: 16px;
    }

    #qrcode {
      margin-top: 20px;
    }

    #status {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h2>UPI QR Code Generator</h2>

  <form id="upiForm">
    <input type="text" id="payeeVPA" placeholder="Payee UPI ID (e.g. name@bank)" required />
    <input type="text" id="payeeName" placeholder="Payee Name" required />
    <input type="number" id="amount" placeholder="Amount (INR)" required />
    <input type="text" id="note" placeholder="Payment Note" />
    <button type="submit">Generate QR Code</button>
  </form>

  <div id="qrcode"></div>
  <div id="status"></div>

  <!-- QR Code Generator Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const form = document.getElementById('upiForm');
    const qrCodeDiv = document.getElementById('qrcode');
    const statusDiv = document.getElementById('status');
    let qr;

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const vpa = document.getElementById('payeeVPA').value.trim();
      const name = document.getElementById('payeeName').value.trim();
      const amount = document.getElementById('amount').value.trim();
      const note = document.getElementById('note').value.trim();

      if (!vpa || !name || !amount) {
        alert("Please fill all required fields.");
        return;
      }

      // UPI Payment URI format
      const upiLink = `upi://pay?pa=${vpa}&pn=${encodeURIComponent(name)}&am=${amount}&cu=INR&tn=${encodeURIComponent(note)}`;

      // Clear previous QR code
      qrCodeDiv.innerHTML = '';
      statusDiv.innerText = '';

      // Generate QR code
      qr = new QRCode(qrCodeDiv, {
        text: upiLink,
        width: 256,
        height: 256,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
      });

      // Simulated payment status after scan
      setTimeout(() => {
        statusDiv.innerText = "⚠️ This is a static QR. Real payment confirmation not available.";
      }, 2000);
    });
  </script>
</body>
</html>
